# Rendered by scripts/octelium-entra-idp.sh from Terragrunt-managed SSM values.
kind: IdentityProvider
metadata:
  name: entra
  displayName: Microsoft Entra
spec:
  displayName: Sign in with Microsoft
  oidc:
    issuerURL: https://login.microsoftonline.com/<TENANT_ID>/v2.0
    clientID: <CLIENT_ID>
    clientSecret:
      # checkov:skip=CKV_SECRET_6: Octelium Secret resource name, not secret material.
      fromSecret: entra-client-secret
    identifierClaim: preferred_username
    scopes:
      - profile
      - email
