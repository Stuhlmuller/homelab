kind: Namespace
metadata:
  name: homelab
spec: {}
---
kind: User
metadata:
  name: homelab-octelium-client
spec:
  type: WORKLOAD
---
kind: Service
metadata:
  name: homelab-demo.homelab
spec:
  mode: WEB
  port: 80
  config:
    upstream:
      url: http://octelium-demo.octelium-client.svc:8080
      user: homelab-octelium-client
