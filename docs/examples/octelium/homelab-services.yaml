kind: Policy
metadata:
  name: homelab-human-web-access
spec:
  rules:
    - effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.spec.type == "HUMAN"
            - match: ctx.session.status.type == "CLIENT"
            - match: ctx.service.spec.mode in ["WEB", "TCP"]
---
kind: Policy
metadata:
  name: homelab-workload-web-serve
spec:
  rules:
    - effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.metadata.name == "homelab-octelium-client"
            - match: ctx.user.spec.type == "WORKLOAD"
            - match: ctx.session.status.type == "CLIENT"
            - match: ctx.service.spec.mode in ["WEB", "TCP"]
---
kind: Policy
metadata:
  name: homelab-ci-kubernetes-api-access
spec:
  rules:
    - effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.metadata.name == "homelab-ci"
            - match: ctx.user.spec.type == "WORKLOAD"
            - match: ctx.session.status.type == "CLIENT"
            - match: ctx.service.metadata.name in ["kubernetes-api", "kubernetes-api.ci"]
            - match: ctx.service.spec.mode == "TCP"
---
kind: Namespace
metadata:
  name: homelab
spec:
  authorization:
    policies:
      - homelab-human-web-access
      - homelab-workload-web-serve
---
kind: Namespace
metadata:
  name: ci
spec:
  authorization:
    policies:
      - homelab-ci-kubernetes-api-access
---
kind: User
metadata:
  name: homelab-octelium-client
spec:
  type: WORKLOAD
---
kind: User
metadata:
  name: homelab-ci
spec:
  type: WORKLOAD
---
kind: User
metadata:
  name: homelab-e2e
spec:
  type: HUMAN
---
kind: Service
metadata:
  name: homelab-app-gateway.homelab
spec:
  mode: TCP
  port: 443
  config:
    upstream:
      url: tcp://istio-ingressgateway.istio-system.svc.cluster.local:443
