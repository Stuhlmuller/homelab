kind: Policy
metadata:
  name: homelab-human-web-access
spec:
  rules:
    - effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.spec.type == "HUMAN"
            - match: ctx.session.status.type == "CLIENT"
            - match: ctx.service.spec.mode == "WEB"
---
kind: Namespace
metadata:
  name: homelab
spec:
  authorization:
    policies:
      - homelab-human-web-access
---
kind: User
metadata:
  name: homelab-octelium-client
spec:
  type: WORKLOAD
---
kind: Service
metadata:
  name: argocd.homelab
spec:
  mode: WEB
  port: 80
  config:
    upstream:
      url: http://argocd-server.argocd.svc.cluster.local:80
      user: homelab-octelium-client
---
