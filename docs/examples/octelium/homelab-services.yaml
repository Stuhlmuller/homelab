kind: Policy
metadata:
  name: homelab-human-web-access
spec:
  rules:
    - effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.spec.type == "HUMAN"
            - match: ctx.service.spec.mode == "WEB"
            - any:
                of:
                  - match: ctx.session.status.type == "CLIENT"
                  - match: ctx.session.status.type == "CLIENTLESS" && ctx.session.status.isBrowser
---
kind: Policy
metadata:
  name: homelab-workload-web-serve
spec:
  rules:
    - effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.metadata.name == "homelab-octelium-client"
            - match: ctx.user.spec.type == "WORKLOAD"
            - match: ctx.session.status.type == "CLIENT"
            - match: ctx.service.metadata.name == "homelab-demo.homelab"
            - match: ctx.service.spec.mode == "WEB"
---
kind: Policy
metadata:
  name: homelab-ci-kubernetes-api-access
spec:
  rules:
    - name: connect-api
      effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.metadata.name == "homelab-ci"
            - match: ctx.user.spec.type == "WORKLOAD"
            - match: ctx.session.status.type == "CLIENT"
            - match: ctx.namespace.metadata.name == "octelium-api"
            - match: ctx.service.spec.mode == "GRPC"
            - match: ctx.request.grpc.serviceFullName == "octelium.api.main.user.v1.MainService"
            - match: ctx.request.grpc.method == "Connect"
    - name: kubernetes-api-service
      effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.metadata.name == "homelab-ci"
            - match: ctx.user.spec.type == "WORKLOAD"
            - match: ctx.session.status.type == "CLIENT"
            - match: ctx.service.metadata.name in ["kubernetes-api", "kubernetes-api.ci"]
            - match: ctx.service.spec.mode == "TCP"
---
kind: Policy
metadata:
  name: homelab-cordium-user-access
spec:
  rules:
    - effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.metadata.name == "homelab-cordium-user"
            - match: ctx.user.spec.type == "HUMAN"
            - match: ctx.service.metadata.name == "cordium"
            - match: ctx.service.spec.mode == "WEB"
            - any:
                of:
                  - match: ctx.session.status.type == "CLIENT"
                  - match: ctx.session.status.type == "CLIENTLESS" && ctx.session.status.isBrowser
---
kind: Policy
metadata:
  name: homelab-cordium-agent-api-access
spec:
  rules:
    - effect: ALLOW
      condition:
        all:
          of:
            - match: ctx.user.metadata.name == "homelab-cordium-agent"
            - match: ctx.user.spec.type == "WORKLOAD"
            - match: ctx.session.status.type == "CLIENT"
            - match: ctx.service.metadata.name == "cordium-agent-api.homelab"
            - match: ctx.service.spec.mode == "GRPC"
---
kind: Namespace
metadata:
  name: homelab
spec:
  authorization:
    policies:
      - homelab-human-web-access
      - homelab-workload-web-serve
      - homelab-cordium-user-access
      - homelab-cordium-agent-api-access
---
kind: Namespace
metadata:
  name: ci
spec:
  authorization:
    policies:
      - homelab-ci-kubernetes-api-access
---
kind: User
metadata:
  name: homelab-octelium-client
spec:
  type: WORKLOAD
---
kind: User
metadata:
