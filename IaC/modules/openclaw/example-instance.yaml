# Example OpenClawInstance
# After deploying the operator, you can create an instance using this example
#
# Before deploying, create the API credentials secret:
# kubectl create secret generic openclaw-api-keys \
#   --namespace openclaw-operator-system \
#   --from-literal=ANTHROPIC_API_KEY="sk-ant-..."
#
# Then apply this manifest:
# kubectl apply -f example-instance.yaml

apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: my-agent
  namespace: openclaw-operator-system
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  storage:
    persistence:
      enabled: true
      size: 10Gi
