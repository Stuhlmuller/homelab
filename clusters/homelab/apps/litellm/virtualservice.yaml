apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: litellm-tailnet
  namespace: ai
  annotations:
    homelab.rst.io/public-funnel: "false"
spec:
  hosts:
    - litellm.stinkyboi.com
  gateways:
    - istio-system/tailnet-gateway
  http:
    - route:
        - destination:
            host: litellm.ai.svc.cluster.local
            port:
              number: 4000
