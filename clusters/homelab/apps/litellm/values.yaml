image:
  repository: ghcr.io/berriai/litellm-database
  tag: main-v1.80.8-stable@sha256:3305291fc9fa1b53196e21567a97f4c51e3a38bdc4e19704e38a551ee7712cd8
environmentSecrets:
  - litellm-provider-keys
service:
  type: ClusterIP
  port: 4000
masterkeySecretName: litellm-provider-keys
masterkeySecretKey: LITELLM_MASTER_KEY
proxy_config:
  general_settings:
    master_key: os.environ/LITELLM_MASTER_KEY
  model_list:
    - model_name: openai-default
      litellm_params:
        model: openai/gpt-4.1-mini
        api_key: os.environ/OPENAI_API_KEY
db:
  deployStandalone: false
migrationJob:
  enabled: false
