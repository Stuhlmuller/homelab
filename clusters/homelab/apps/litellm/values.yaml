image:
  repository: ghcr.io/berriai/litellm
  tag: main-stable
envFrom:
  - secretRef:
      name: litellm-provider-keys
service:
  type: ClusterIP
  port: 4000
persistence:
  enabled: true
  storageClass: nfs-default
  size: 10Gi
config:
  general_settings:
    master_key: os.environ/LITELLM_MASTER_KEY
  model_list:
    - model_name: openai-default
      litellm_params:
        model: openai/gpt-4.1-mini
        api_key: os.environ/OPENAI_API_KEY

