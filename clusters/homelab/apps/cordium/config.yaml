apiVersion: v1
kind: ConfigMap
metadata:
  name: cordium-user-config
  namespace: octelium
  labels:
    app.kubernetes.io/name: cordium
    app.kubernetes.io/component: user-config
    app.kubernetes.io/part-of: homelab
data:
  workspace-template.yaml: |
    spec:
      image:
        registry:
          url: ghcr.io/openclaw/openclaw:2026.5.28
      runtime:
        autoStop: false
        envVars:
          - key: CORDIUM_PROFILE
            value: user
        tasks:
          - name: prepare-workspace
            type: ON_CREATE
            run: |
              mkdir -p /workspace
              git config --global init.defaultBranch main
      limit:
        cpu:
          millicores: 4000
        memory:
          megabytes: 8192
        storage:
          megabytes: 20480
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cordium-agent-config
  namespace: octelium
  labels:
    app.kubernetes.io/name: cordium
    app.kubernetes.io/component: agent-config
    app.kubernetes.io/part-of: homelab
data:
  workspace-template.yaml: |
    spec:
      image:
        registry:
          url: ghcr.io/openclaw/openclaw:2026.5.28
      runtime:
        autoStop: true
        envVars:
          - key: CORDIUM_PROFILE
            value: agent
        tasks:
          - name: prepare-agent-workspace
            type: ON_CREATE
            run: |
              mkdir -p /workspace
              git config --global init.defaultBranch main
          - name: agent-readiness
            type: POST_START
            run: |
              command -v git
              command -v node
      limit:
        cpu:
          millicores: 6000
        memory:
          megabytes: 12288
        storage:
          megabytes: 30720
