apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: cordium-tailnet
  namespace: octelium
  annotations:
    homelab.rst.io/public-funnel: "false"
spec:
  hosts:
    - cordium.stinkyboi.com
    - "*.cordium.stinkyboi.com"
  gateways:
    - istio-system/tailnet-gateway
  http:
    - route:
        - destination:
            host: svc-default-cordium.octelium.svc.cluster.local
            port:
              number: 8080
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: connect-failure,refused-stream,reset,5xx
