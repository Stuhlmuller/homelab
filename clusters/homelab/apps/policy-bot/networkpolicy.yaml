apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: policy-bot
  namespace: automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: policy-bot
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: octelium-client
      ports:
        - protocol: TCP
          port: 8080
