apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-bot
  namespace: automation
  labels:
    app.kubernetes.io/name: policy-bot
    app.kubernetes.io/part-of: homelab-automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: policy-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: policy-bot
        app.kubernetes.io/part-of: homelab-automation
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: policy-bot
          image: palantirtechnologies/policy-bot:1.41.1@sha256:1babe4d474db1ed7184146fbd2d332138c30121b2f860451347d9dbb825f5a20
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/metrics
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/metrics
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          secret:
            secretName: policy-bot-config
        - name: tmp
          emptyDir: {}
