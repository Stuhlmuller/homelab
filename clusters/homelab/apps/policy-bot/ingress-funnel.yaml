apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: policy-bot-hook-funnel
  namespace: automation
  annotations:
    tailscale.com/funnel: "true"
    homelab.rst.io/public-funnel: "true"
    homelab.rst.io/public-funnel-reviewed: "true"
    homelab.rst.io/public-funnel-purpose: "GitHub webhook deliveries to policy-bot only."
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - policy-bot-hook
  rules:
    - http:
        paths:
          - path: /api/github/hook
            pathType: Prefix
            backend:
              service:
                name: policy-bot
                port:
                  name: http
