apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freqtrade-api
  namespace: finance
  annotations:
    homelab.stuhlmuller.dev/generated-secret-revision: "v1"
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: freqtrade-api
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: FREQTRADE__API_SERVER__PASSWORD
      remoteRef:
        key: /homelab/freqtrade/api-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: FREQTRADE__API_SERVER__JWT_SECRET_KEY
      remoteRef:
        key: /homelab/freqtrade/jwt-secret-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: FREQTRADE__API_SERVER__WS_TOKEN
      remoteRef:
        key: /homelab/freqtrade/ws-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
