controllers:
  freqtrade:
    strategy: Recreate
    pod:
      annotations:
        homelab.rst.io/mesh-mode: "tailnet-ingress"
        homelab.rst.io/trading-mode: "dry-run"
    containers:
      app:
        image:
          repository: freqtradeorg/freqtrade
          tag: "2026.4"
        command:
          - freqtrade
        args:
          - trade
          - --config
          - /freqtrade/config/config.json
          - --strategy
          - HomelabBtcTrend
          - --strategy-path
          - /freqtrade/strategies
        env:
          TZ: America/Los_Angeles
        envFrom:
          - secretRef:
              name: freqtrade-api
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              failureThreshold: 30
              periodSeconds: 10
              timeoutSeconds: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 3
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 3
service:
  app:
    controller: freqtrade
    ports:
      http:
        port: 8080
persistence:
  data:
    enabled: true
    storageClass: nfs-default
    size: 10Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      freqtrade:
        app:
          - path: /freqtrade/user_data
  config:
    enabled: true
    type: configMap
    name: freqtrade-config
    advancedMounts:
      freqtrade:
        app:
          - path: /freqtrade/config
            readOnly: true
  strategies:
    enabled: true
    type: configMap
    name: freqtrade-strategies
    advancedMounts:
      freqtrade:
        app:
          - path: /freqtrade/strategies
            readOnly: true
