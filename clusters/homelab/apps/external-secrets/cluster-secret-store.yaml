apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
  annotations:
    homelab.rst.io/runtime-prerequisite: aws-ssm-auth-secret
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-ssm-auth
            namespace: external-secrets
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-ssm-auth
            namespace: external-secrets
            key: secret-access-key

