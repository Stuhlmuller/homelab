---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-image-updater-git
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: argocd-image-updater-git
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: argocd-image-updater-git
          app.kubernetes.io/part-of: argocd
          app.kubernetes.io/managed-by: external-secrets
  data:
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: githubAppID
      remoteRef:
        key: /homelab/argocd-image-updater/github-app/id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: githubAppInstallationID
      remoteRef:
        key: /homelab/argocd-image-updater/github-app/installation-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: /homelab/argocd-image-updater/github-app/private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
