apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deluge-auth
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: deluge-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: web-password # checkov:skip=CKV_SECRET_6: target key name, not a secret value
      remoteRef:
        key: /homelab/deluge/web-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
