serviceAccount:
  deluge: {}
controllers:
  deluge:
    serviceAccount:
      identifier: deluge
    pod:
      automountServiceAccountToken: false
      annotations:
        homelab.rst.io/rollout-strategy: "recreate-singleton"
        homelab.rst.io/wireguard-address-mode: "ipv4-only"
        homelab.rst.io/wireguard-profile-ssm-version: "2"
    strategy: Recreate
    initContainers:
      download-dirs:
        image:
          repository: busybox
          tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
          - /bin/sh
          - -ec
          - |
            mkdir -p \
              /downloads/incomplete \
              /downloads/complete/radarr \
              /downloads/complete/sonarr \
              /downloads/complete/manual
      gluetun:
        image:
          repository: ghcr.io/qdm12/gluetun
          tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
        restartPolicy: Always
        env:
          TZ: America/Los_Angeles
          VPN_SERVICE_PROVIDER: custom
          VPN_TYPE: wireguard
          FIREWALL: "on"
          FIREWALL_INPUT_PORTS: "8112"
          FIREWALL_VPN_INPUT_PORTS: &delugeIncomingPort "5983"
          HEALTH_RESTART_VPN: "on"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_ADMIN
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 36
              periodSeconds: 5
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/deluge
          tag: 2.2.0@sha256:0f775eabb317192909f50d768d274cddeb7d0f1b42db8ac688dca32db404e32a
        env:
          TZ: America/Los_Angeles
          PUID: "1000"
          PGID: "1000"
      port-config:
        image:
          repository: lscr.io/linuxserver/deluge
          tag: 2.2.0@sha256:0f775eabb317192909f50d768d274cddeb7d0f1b42db8ac688dca32db404e32a
        env:
          DELUGE_INCOMING_PORT: *delugeIncomingPort
        command:
          - /bin/sh
          - -ec
          - |
            rm -f /tmp/deluge-port-configured
            expected="listen_ports: (${DELUGE_INCOMING_PORT}, ${DELUGE_INCOMING_PORT})"
            port_command="config --set random_port false; config --set listen_ports (${DELUGE_INCOMING_PORT}, ${DELUGE_INCOMING_PORT})"
            for attempt in $(seq 1 120); do
              timeout 10s deluge-console -c /config "$port_command" || true
              listen_ports="$(timeout 10s deluge-console -c /config "config listen_ports" 2>&1 || true)"
              printf "%s\n" "$listen_ports"
              if printf "%s\n" "$listen_ports" | grep -F "$expected" >/dev/null; then
                touch /tmp/deluge-port-configured
                exec tail -f /dev/null
              fi
              sleep 2
            done
            echo "failed to configure Deluge listen port ${DELUGE_INCOMING_PORT}" >&2
            exit 1
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - test -f /tmp/deluge-port-configured
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
service:
  app:
    controller: deluge
    ports:
      http:
        port: 8112
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: deluge-config
    advancedMounts:
      deluge:
        app:
          - path: /config
        port-config:
          - path: /config
  downloads:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-downloads
    advancedMounts:
      deluge:
        download-dirs:
          - path: /downloads
            subPath: downloads
        app:
          - path: /downloads
            subPath: downloads
  tun:
    enabled: true
    type: hostPath
    hostPath: /dev/net/tun
    hostPathType: CharDevice
    advancedMounts:
      deluge:
        gluetun:
          - path: /dev/net/tun
  vpn-profile:
    enabled: true
    type: secret
    name: deluge-vpn
    items:
      - key: wg0.conf
        path: wg0.conf
    advancedMounts:
      deluge:
        gluetun:
          - path: /gluetun/wireguard
            readOnly: true
