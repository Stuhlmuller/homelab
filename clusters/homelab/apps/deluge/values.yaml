serviceAccount:
  deluge: {}
controllers:
  deluge:
    serviceAccount:
      identifier: deluge
    pod:
      annotations:
        homelab.rst.io/rollout-strategy: "recreate-singleton"
        homelab.rst.io/wireguard-address-mode: "ipv4-only"
    strategy: Recreate
    initContainers:
      download-dirs:
        image:
          repository: busybox
          tag: 1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
        command:
          - /bin/sh
          - -ec
          - |
            mkdir -p \
              /downloads/incomplete \
              /downloads/complete/radarr \
              /downloads/complete/sonarr \
              /downloads/complete/manual
      gluetun:
        image:
          repository: ghcr.io/qdm12/gluetun
          tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
        restartPolicy: Always
        env:
          TZ: America/Los_Angeles
          VPN_SERVICE_PROVIDER: airvpn
          VPN_TYPE: wireguard
          WIREGUARD_ALLOWED_IPS: "0.0.0.0/0"
          FIREWALL: "on"
          FIREWALL_INPUT_PORTS: "8112"
          FIREWALL_VPN_INPUT_PORTS: &delugeIncomingPort "5983"
          HEALTH_RESTART_VPN: "on"
        envFrom:
          - secretRef:
              name: deluge-vpn
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_ADMIN
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 36
              periodSeconds: 5
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/deluge
          tag: 2.1.1@sha256:9de4b097e0cb5dceb5ef0aaa4deb2565101c65e7d06770a59151770750a54858
        env:
          TZ: America/Los_Angeles
          PUID: "1000"
          PGID: "1000"
      port-config:
        image:
          repository: lscr.io/linuxserver/deluge
          tag: 2.1.1@sha256:9de4b097e0cb5dceb5ef0aaa4deb2565101c65e7d06770a59151770750a54858
        env:
          DELUGE_INCOMING_PORT: *delugeIncomingPort
        command:
          - /bin/sh
          - -ec
          - |
            rm -f /tmp/deluge-port-configured
            expected="listen_ports: (${DELUGE_INCOMING_PORT}, ${DELUGE_INCOMING_PORT})"
            for attempt in $(seq 1 120); do
              timeout 10s deluge-console -c /config "config --set random_port false; config --set listen_ports (${DELUGE_INCOMING_PORT}, ${DELUGE_INCOMING_PORT})" || true
              listen_ports="$(timeout 10s deluge-console -c /config "config listen_ports" 2>&1 || true)"
              printf "%s\n" "$listen_ports"
              if printf "%s\n" "$listen_ports" | grep -F "$expected" >/dev/null; then
                touch /tmp/deluge-port-configured
                exec tail -f /dev/null
              fi
              sleep 2
            done
            echo "failed to configure Deluge listen port ${DELUGE_INCOMING_PORT}" >&2
            exit 1
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - test -f /tmp/deluge-port-configured
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
service:
  app:
    controller: deluge
    ports:
      http:
        port: 8112
persistence:
  config:
    enabled: true
    storageClass: nfs-default
    size: 5Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      deluge:
        app:
          - path: /config
        port-config:
          - path: /config
  downloads:
    enabled: true
    storageClass: nfs-default
    size: 200Gi
    accessMode: ReadWriteMany
    advancedMounts:
      deluge:
        download-dirs:
          - path: /downloads
        app:
          - path: /downloads
  tun:
    enabled: true
    type: hostPath
    hostPath: /dev/net/tun
    hostPathType: CharDevice
    advancedMounts:
      deluge:
        gluetun:
          - path: /dev/net/tun
