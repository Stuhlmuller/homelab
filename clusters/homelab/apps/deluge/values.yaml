serviceAccount:
  deluge: {}
controllers:
  deluge:
    serviceAccount:
      identifier: deluge
    pod:
      automountServiceAccountToken: false
      annotations:
        homelab.rst.io/rollout-strategy: "recreate-singleton"
        homelab.rst.io/wireguard-address-mode: "ipv4-only"
        homelab.rst.io/wireguard-profile-renderer-revision: "strip-ipv6-routes-v1"
        homelab.rst.io/wireguard-profile-ssm-version: "4"
    strategy: Recreate
    initContainers:
      download-dirs:
        image:
          repository: busybox
          tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
          - /bin/sh
          - -ec
          - |
            mkdir -p \
              /downloads/incomplete \
              /downloads/complete/radarr \
              /downloads/complete/sonarr \
              /downloads/complete/manual
      config-wireguard:
        image:
          repository: busybox
          tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
          - /bin/sh
          - -ec
          - |
            source_config=/vpn-source/wg0.conf
            target_config=/gluetun/wireguard/wg0.conf
            test -s "$source_config"
            endpoint="$(
              awk -F= '
                tolower($1) ~ /^[[:space:]]*endpoint[[:space:]]*$/ {
                  value=$2
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                  print value
                  exit
                }
              ' "$source_config"
            )"
            host="${endpoint%:*}"
            port="${endpoint##*:}"
            if [ -z "$endpoint" ] || [ "$host" = "$endpoint" ] || [ -z "$port" ]; then
              echo "WireGuard config must contain Endpoint = host:port" >&2
              exit 1
            fi
            if printf "%s\n" "$host" | grep -Eq '^[0-9]+([.][0-9]+){3}$'; then
              endpoint_ip="$host"
            else
              endpoint_ip="$(
                nslookup "$host" |
                  awk '/^Address: / {print $2}' |
                  grep -E '^[0-9]+([.][0-9]+){3}$' |
                  head -n 1
              )"
              if [ -z "$endpoint_ip" ]; then
                echo "failed to resolve WireGuard endpoint hostname" >&2
                exit 1
              fi
            fi
            awk -F= -v replacement="Endpoint = ${endpoint_ip}:${port}" '
              function trim(value) {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                return value
              }

              function ipv4_cidr_list(value, parts, count, output, item, i) {
                count = split(value, parts, ",")
                output = ""
                for (i = 1; i <= count; i++) {
                  item = trim(parts[i])
                  if (item ~ /^[0-9]+([.][0-9]+){3}\/[0-9]+$/) {
                    output = output (output == "" ? "" : ", ") item
                  }
                }
                return output
              }

              /^[[:space:]]*Endpoint[[:space:]]*=/ && !done {
                print replacement
                done=1
                next
              }

              tolower($1) ~ /^[[:space:]]*address[[:space:]]*$/ {
                ipv4_addresses = ipv4_cidr_list($2)
                if (ipv4_addresses == "" || address_done) {
                  next
                }
                print "Address = " ipv4_addresses
                address_done=1
                next
              }

              tolower($1) ~ /^[[:space:]]*allowedips[[:space:]]*$/ {
                ipv4_allowed_ips = ipv4_cidr_list($2)
                if (ipv4_allowed_ips == "" || allowed_ips_done) {
                  next
                }
                print "AllowedIPs = " ipv4_allowed_ips
                allowed_ips_done=1
                next
              }

              { print }
              END {
                if (!done) {
                  print "WireGuard config must contain Endpoint = host:port" > "/dev/stderr"
                  exit 1
                }
                if (!address_done) {
                  print "WireGuard config must contain an IPv4 Address entry" > "/dev/stderr"
                  exit 1
                }
                if (!allowed_ips_done) {
                  print "WireGuard config must contain IPv4 AllowedIPs" > "/dev/stderr"
                  exit 1
                }
              }
            ' "$source_config" >"${target_config}.tmp"
            chmod 0400 "${target_config}.tmp"
            mv "${target_config}.tmp" "$target_config"
      gluetun:
        image:
          repository: ghcr.io/qdm12/gluetun
          tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
        restartPolicy: Always
        lifecycle:
          postStart:
            exec:
              command:
                - /bin/sh
                - -c
                - (ip rule del table 51820; ip -6 rule del table 51820) || true
        env:
          TZ: America/Los_Angeles
          VPN_SERVICE_PROVIDER: custom
          VPN_TYPE: wireguard
          FIREWALL: "on"
          FIREWALL_INPUT_PORTS: "8112"
          FIREWALL_VPN_INPUT_PORTS: "5983"
          HEALTH_RESTART_VPN: "on"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_ADMIN
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 36
              periodSeconds: 5
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /gluetun-entrypoint
                  - healthcheck
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/deluge
          tag: 18.04.1@sha256:0ac8716243944d28890565f759c7cedfc9e36a3fd5a827c9d0927abc0c8f97c9
        command:
          - /bin/sh
          - -ec
          - |
            validate_session_states() {
              timeout 15s python3 - "$@" <<'PY'
            import libtorrent as lt, sys
            session = lt.session()
            for path in sys.argv[1:]:
                with open(path, "rb") as state_file:
                    state = lt.bdecode(state_file.read())
                session.load_state(state)
            PY
            }

            state=/config/session.state
            backup=${state}.bak
            timestamp="$(date -u +%Y%m%dT%H%M%SZ)"

            if ! [ -e "$state" ] && ! [ -e "$backup" ]; then
              echo "No persisted session state found; allowing Deluge to initialize it"
            elif ! [ -s "$state" ] || ! validate_session_states "$state"; then
              test -s "$backup"
              validate_session_states "$backup"
              if [ -e "$state" ]; then
                archive="${state}.broken-${timestamp}"
                cp -a "$state" "$archive"
                echo "Archived invalid session state at $archive"
              fi
              cp -a "$backup" "$state"
              echo "Restored validated session state backup"
            elif [ -e "$backup" ]; then
              if ! [ -s "$backup" ] || ! validate_session_states "$state" "$backup"; then
                archive="${backup}.broken-${timestamp}"
                cp -a "$backup" "$archive"
                cp -a "$state" "$backup"
                echo "Archived incompatible session state backup at $archive and refreshed it from current state"
              fi
            fi

            exec /init
        env:
          TZ: America/Los_Angeles
          PUID: "1000"
          PGID: "1000"
        lifecycle:
          preStop:
            exec:
              command:
                - /bin/sh
                - -c
                - s6-svc -d /var/run/s6/services/deluged && timeout 20s s6-svwait -d /var/run/s6/services/deluged || true
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - timeout 10s deluge-console -c /config status >/dev/null 2>&1
              failureThreshold: 3
              initialDelaySeconds: 60
              periodSeconds: 30
              timeoutSeconds: 12
      port-config:
        image:
          repository: lscr.io/linuxserver/deluge
          tag: 18.04.1@sha256:0ac8716243944d28890565f759c7cedfc9e36a3fd5a827c9d0927abc0c8f97c9
        env:
          DELUGE_INCOMING_PORT: "5983"
        command:
          - /bin/sh
          - -ec
          - |
            rm -f /tmp/deluge-port-configured
            expected_listen_ports="listen_ports: (${DELUGE_INCOMING_PORT}, ${DELUGE_INCOMING_PORT})"
            expected_random_outgoing="random_outgoing_ports: True"
            port_command="config --set random_port false"
            port_command="${port_command}; config --set listen_ports (${DELUGE_INCOMING_PORT}, ${DELUGE_INCOMING_PORT})"
            port_command="${port_command}; config --set random_outgoing_ports true"
            port_command="${port_command}; config --set outgoing_ports (0, 0)"
            while true; do
              timeout 10s deluge-console -c /config "$port_command" || true
              listen_ports="$(timeout 10s deluge-console -c /config "config listen_ports" 2>&1 || true)"
              outgoing_ports="$(timeout 10s deluge-console -c /config "config outgoing_ports" 2>&1 || true)"
              random_outgoing="$(timeout 10s deluge-console -c /config "config random_outgoing_ports" 2>&1 || true)"
              printf "%s\n" "$listen_ports"
              printf "%s\n" "$outgoing_ports"
              printf "%s\n" "$random_outgoing"
              if printf "%s\n" "$listen_ports" | grep -F "$expected_listen_ports" >/dev/null &&
                printf "%s\n" "$random_outgoing" | grep -F "$expected_random_outgoing" >/dev/null; then
                touch /tmp/deluge-port-configured
                exec tail -f /dev/null
              fi
              sleep 2
            done
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
      daemon-metrics:
        image:
          repository: lscr.io/linuxserver/deluge
          tag: 18.04.1@sha256:0ac8716243944d28890565f759c7cedfc9e36a3fd5a827c9d0927abc0c8f97c9
        command:
          - /bin/sh
          - -ec
          - |
            mkdir -p /tmp/deluge-metrics
            metrics=/tmp/deluge-metrics/metrics

            write_metrics() {
              healthy=0
              vpn_healthy=0
              total=0
              errors=0
              if status_output="$(timeout 10s deluge-console -c /config status 2>&1)"; then
                healthy=1
                total="$(
                  printf "%s\n" "$status_output" |
                    awk -F: '/^[ \t]*Total torrents:/ {gsub(/^[ \t]+/, "", $2); print $2; exit}'
                )"
                errors="$(
                  printf "%s\n" "$status_output" |
                    awk -F: '/^[ \t]*Error:/ {gsub(/^[ \t]+/, "", $2); print $2; exit}'
                )"
              fi
              if curl --fail --silent --max-time 5 http://127.0.0.1:9999/ >/dev/null; then
                vpn_healthy=1
              fi
              total="${total:-0}"
              errors="${errors:-0}"
              cat >"${metrics}.tmp" <<EOF
            # HELP deluge_daemon_rpc_healthy Whether deluge-console can query the Deluge daemon.
            # TYPE deluge_daemon_rpc_healthy gauge
            deluge_daemon_rpc_healthy ${healthy}
            # HELP deluge_vpn_healthy Whether the Gluetun VPN health endpoint is healthy.
            # TYPE deluge_vpn_healthy gauge
            deluge_vpn_healthy ${vpn_healthy}
            # HELP deluge_torrents_total Number of torrents reported by Deluge.
            # TYPE deluge_torrents_total gauge
            deluge_torrents_total ${total}
            # HELP deluge_torrents_error Number of torrents currently in Deluge Error state.
            # TYPE deluge_torrents_error gauge
            deluge_torrents_error ${errors}
            EOF
              mv "${metrics}.tmp" "$metrics"
            }

            write_metrics
            while true; do
              sleep 30
              write_metrics
            done &

            exec python3 - <<'PY'
            from http.server import BaseHTTPRequestHandler, HTTPServer


            class MetricsHandler(BaseHTTPRequestHandler):
                def do_GET(self):
                    if self.path != "/metrics":
                        self.send_response(404)
                        self.end_headers()
                        return
                    try:
                        with open("/tmp/deluge-metrics/metrics", "rb") as metrics:
                            body = metrics.read()
                    except FileNotFoundError:
                        body = b""
                    self.send_response(200)
                    self.send_header("Content-Type", "text/plain; version=0.0.4")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)

                def log_message(self, format, *args):
                    return


            HTTPServer(("0.0.0.0", 9797), MetricsHandler).serve_forever()
            PY
        securityContext:
          allowPrivilegeEscalation: false
          runAsGroup: 1000
          runAsUser: 1000
service:
  app:
    controller: deluge
    ports:
      http:
        port: 8112
      metrics:
        port: 9797
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: deluge-config
    advancedMounts:
      deluge:
        app:
          - path: /config
        port-config:
          - path: /config
        daemon-metrics:
          - path: /config
            readOnly: true
  downloads:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-downloads
    advancedMounts:
      deluge:
        download-dirs:
          - path: /downloads
            subPath: downloads
        app:
          - path: /downloads
            subPath: downloads
  tun:
    enabled: true
    type: hostPath
    hostPath: /dev/net/tun
    hostPathType: CharDevice
    advancedMounts:
      deluge:
        gluetun:
          - path: /dev/net/tun
  vpn-profile:
    enabled: true
    type: emptyDir
    advancedMounts:
      deluge:
        config-wireguard:
          - path: /gluetun/wireguard
        gluetun:
          - path: /gluetun/wireguard
            readOnly: true
  vpn-profile-source:
    enabled: true
    type: secret
    name: deluge-vpn
    items:
      - key: wg0.conf
        path: wg0.conf
    advancedMounts:
      deluge:
        config-wireguard:
          - path: /vpn-source
            readOnly: true
