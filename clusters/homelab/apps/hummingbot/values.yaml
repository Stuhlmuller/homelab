controllers:
  hummingbot:
    strategy: Recreate
    pod:
      annotations:
        homelab.rst.io/trading-mode: "manual"
    initContainers:
      bootstrap-password:
        image:
          repository: hummingbot/hummingbot
          tag: "version-2.14.0@sha256:6aa4f635b74426e1da8428a06c3a3f4e80f46be1d2657d2b55c6ab26fc6db7a0"
        envFrom:
          - secretRef:
              name: hummingbot-config
        command:
          - /bin/bash
          - -lc
          - |
            set -eu

            : "${CONFIG_PASSWORD:?CONFIG_PASSWORD must be provided by hummingbot-config}"

            mkdir -p \
              /home/hummingbot/conf/connectors \
              /home/hummingbot/conf/controllers \
              /home/hummingbot/conf/scripts \
              /home/hummingbot/conf/strategies \
              /home/hummingbot/certs \
              /home/hummingbot/controllers \
              /home/hummingbot/data \
              /home/hummingbot/logs \
              /home/hummingbot/scripts

            if [ ! -s /home/hummingbot/conf/.password_verification ]; then
              source /opt/conda/etc/profile.d/conda.sh
              conda activate hummingbot
              python -c 'import os; from hummingbot.client.config.config_crypt import ETHKeyFileSecretManger, store_password_verification; store_password_verification(ETHKeyFileSecretManger(os.environ["CONFIG_PASSWORD"]))'
            fi
    containers:
      app:
        image:
          repository: hummingbot/hummingbot
          tag: "version-2.14.0@sha256:6aa4f635b74426e1da8428a06c3a3f4e80f46be1d2657d2b55c6ab26fc6db7a0"
        env:
          TZ: America/Los_Angeles
        envFrom:
          - secretRef:
              name: hummingbot-config
        stdin: true
        tty: true
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            memory: 3Gi
      route-status:
        image:
          repository: hummingbot/hummingbot
          tag: "version-2.14.0@sha256:6aa4f635b74426e1da8428a06c3a3f4e80f46be1d2657d2b55c6ab26fc6db7a0"
        command:
          - /bin/bash
          - -lc
          - |
            set -eu

            mkdir -p /tmp/hummingbot-route
            cat > /tmp/hummingbot-route/index.html <<'EOF'
            <!doctype html>
            <html lang="en">
              <head>
                <meta charset="utf-8">
                <meta name="viewport" content="width=device-width, initial-scale=1">
                <title>Hummingbot</title>
              </head>
              <body>
                <main>
                  <h1>Hummingbot</h1>
                  <p>The trading client is running as an interactive CLI workload.</p>
                  <p>Attach with: <code>kubectl -n finance attach -it deploy/hummingbot -c app</code></p>
                </main>
              </body>
            </html>
            EOF

            exec python -m http.server 8000 --bind 0.0.0.0 --directory /tmp/hummingbot-route
        ports:
          - name: http
            containerPort: 8000
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: http
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 2
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: http
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 2
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
persistence:
  conf:
    enabled: true
    storageClass: nfs-default
    size: 5Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      hummingbot:
        app:
          - path: /home/hummingbot/conf
        bootstrap-password:
          - path: /home/hummingbot/conf
  logs:
    enabled: true
    storageClass: nfs-default
    size: 5Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      hummingbot:
        app:
          - path: /home/hummingbot/logs
        bootstrap-password:
          - path: /home/hummingbot/logs
  data:
    enabled: true
    storageClass: nfs-default
    size: 10Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      hummingbot:
        app:
          - path: /home/hummingbot/data
        bootstrap-password:
          - path: /home/hummingbot/data
  certs:
    enabled: true
    storageClass: nfs-default
    size: 1Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      hummingbot:
        app:
          - path: /home/hummingbot/certs
        bootstrap-password:
          - path: /home/hummingbot/certs
  scripts:
    enabled: true
    storageClass: nfs-default
    size: 1Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      hummingbot:
        app:
          - path: /home/hummingbot/scripts
        bootstrap-password:
          - path: /home/hummingbot/scripts
  controllers:
    enabled: true
    storageClass: nfs-default
    size: 1Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      hummingbot:
        app:
          - path: /home/hummingbot/controllers
        bootstrap-password:
          - path: /home/hummingbot/controllers
