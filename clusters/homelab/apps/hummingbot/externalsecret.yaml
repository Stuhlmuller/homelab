apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hummingbot-config
  namespace: finance
  annotations:
    homelab.stuhlmuller.dev/generated-secret-revision: "v1"
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: hummingbot-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: CONFIG_PASSWORD
      remoteRef:
        key: /homelab/hummingbot/config-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
