---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-config
  namespace: media
  labels:
    app.kubernetes.io/name: radarr
    app.kubernetes.io/part-of: homelab-media
    homelab.stuhlmuller.dev/data-class: app-config
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: nfs-default
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-media
  namespace: media
  labels:
    app.kubernetes.io/name: radarr
    app.kubernetes.io/part-of: homelab-media
    homelab.stuhlmuller.dev/data-class: legacy-migration-source
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  storageClassName: nfs-default
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-movies
  labels:
    app.kubernetes.io/name: media-movies
    app.kubernetes.io/part-of: homelab-media
    homelab.stuhlmuller.dev/storage-backend: qnap-media
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 2Ti
  claimRef:
    name: media-movies
    namespace: media
  mountOptions:
    - nfsvers=3
  nfs:
    path: /media
    server: 10.1.0.2
  persistentVolumeReclaimPolicy: Retain
  storageClassName: media-qnap-static
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-movies
  namespace: media
  labels:
    app.kubernetes.io/name: media-movies
    app.kubernetes.io/part-of: homelab-media
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Ti
  storageClassName: media-qnap-static
  volumeName: media-movies
---
apiVersion: batch/v1
kind: Job
metadata:
  name: media-movies-migration
  namespace: media
  labels:
    app.kubernetes.io/name: media-movies-migration
    app.kubernetes.io/part-of: homelab-media
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-movies-migration
        app.kubernetes.io/part-of: homelab-media
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
          command:
            - /bin/sh
            - -ec
            - |
              umask 0000
              mkdir -p /target/movies

              if [ -d /source/movies ]; then
                cp -R /source/movies/. /target/movies/
              fi

              chmod -R a+rwX /target/movies
              touch /target/movies/.migration-write-test
              rm -f /target/movies/.migration-write-test
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: old-movies
              mountPath: /source/movies
              readOnly: true
            - name: media-movies
              mountPath: /target
      volumes:
        - name: old-movies
          persistentVolumeClaim:
            claimName: radarr-media
            readOnly: true
        - name: media-movies
          persistentVolumeClaim:
            claimName: media-movies
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: media-movies-migration
  namespace: media
  labels:
    app.kubernetes.io/name: media-movies-migration
    app.kubernetes.io/part-of: homelab-media
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: media-movies-migration
      app.kubernetes.io/part-of: homelab-media
  policyTypes:
    - Ingress
    - Egress
