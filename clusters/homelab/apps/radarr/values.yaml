serviceAccount:
  radarr: {}
controllers:
  radarr:
    serviceAccount:
      identifier: radarr
    pod:
      automountServiceAccountToken: false
      annotations:
        homelab.rst.io/mesh-mode: "tailnet-ingress"
    initContainers:
      configure-postgres:
        image:
          repository: lscr.io/linuxserver/radarr
          tag: 5.28.0@sha256:c984533510abe0219a70e80d15bd0d212b7df21baa0913759c4ce6cc9092240b
        envFrom:
          - secretRef:
              name: media-postgres-arr-env
        command:
          - /bin/sh
          - -ec
          - |
            config=/config/config.xml
            tmp="$(mktemp /tmp/radarr-config.XXXXXXXXXX)"

            xml_escape() {
              printf '%s' "$1" \
                | sed \
                  -e 's/&/\&amp;/g' \
                  -e 's/</\&lt;/g' \
                  -e 's/>/\&gt;/g' \
                  -e 's/"/\&quot;/g' \
                  -e "s/'/\&apos;/g"
            }

            set_config_tag() {
              tag="$1"
              value="$(xml_escape "$2")"
              awk -v tag="$tag" -v value="$value" '
                BEGIN { found = 0 }
                $0 ~ "<" tag ">" {
                  print "  <" tag ">" value "</" tag ">"
                  found = 1
                  next
                }
                $0 ~ "</Config>" && found == 0 {
                  print "  <" tag ">" value "</" tag ">"
                  found = 1
                }
                { print }
              ' "$config" > "$tmp"
              cat "$tmp" > "$config"
            }

            : "${RADARR_POSTGRES_HOST:?}"
            : "${RADARR_POSTGRES_PORT:?}"
            : "${RADARR_POSTGRES_USER:?}"
            : "${RADARR_POSTGRES_PASSWORD:?}"
            : "${RADARR_POSTGRES_MAIN_DB:?}"
            : "${RADARR_POSTGRES_LOG_DB:?}"

            if [ ! -s "$config" ]; then
              printf '<Config>\n</Config>\n' > "$config"
            fi

            if ! grep -q '</Config>' "$config"; then
              echo "Radarr config.xml is missing a closing </Config> tag" >&2
              exit 1
            fi

            set_config_tag PostgresUser "$RADARR_POSTGRES_USER"
            set_config_tag PostgresPassword "$RADARR_POSTGRES_PASSWORD"
            set_config_tag PostgresPort "$RADARR_POSTGRES_PORT"
            set_config_tag PostgresHost "$RADARR_POSTGRES_HOST"
            set_config_tag PostgresMainDb "$RADARR_POSTGRES_MAIN_DB"
            set_config_tag PostgresLogDb "$RADARR_POSTGRES_LOG_DB"
            set_config_tag AuthenticationMethod External
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/radarr
          tag: 5.28.0@sha256:c984533510abe0219a70e80d15bd0d212b7df21baa0913759c4ce6cc9092240b
        env:
          TZ: America/Los_Angeles
          PUID: "1000"
          PGID: "1000"
          DELUGE_URL: http://deluge.media.svc.cluster.local:8112
service:
  app:
    controller: radarr
    ports:
      http:
        port: 7878
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: radarr-config
    advancedMounts:
      radarr:
        app:
          - path: /config
        configure-postgres:
          - path: /config
  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-movies
    advancedMounts:
      radarr:
        app:
          - path: /movies
            subPath: movies
  downloads:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-downloads
    advancedMounts:
      radarr:
        app:
          - path: /downloads
            subPath: downloads
