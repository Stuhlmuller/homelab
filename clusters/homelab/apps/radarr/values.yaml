serviceAccount:
  radarr: {}
controllers:
  radarr:
    serviceAccount:
      identifier: radarr
    pod:
      automountServiceAccountToken: false
      annotations:
        homelab.rst.io/access-mode: "octelium"
    initContainers:
      configure-postgres:
        image:
          repository: lscr.io/linuxserver/radarr
          tag: 6.3.0@sha256:2b2c1c05eb3f648d2c80dfab9486147dd7bb0ad4d77fa972fc1c5de8f1da3738
        envFrom:
          - secretRef:
              name: media-postgres-arr-env
        command:
          - /bin/sh
          - -ec
          - |
            config=/config/config.xml
            tmp="$(mktemp /tmp/radarr-config.XXXXXXXXXX)"

            xml_escape() {
              printf '%s' "$1" \
                | sed \
                  -e 's/&/\&amp;/g' \
                  -e 's/</\&lt;/g' \
                  -e 's/>/\&gt;/g' \
                  -e 's/"/\&quot;/g' \
                  -e "s/'/\&apos;/g"
            }

            remove_config_tag() {
              tag="$1"
              awk -v tag="$tag" '
                $0 ~ "^[[:space:]]*<" tag ">.*</" tag ">[[:space:]]*$" {
                  next
                }
                { print }
              ' "$config" > "$tmp"
              cat "$tmp" > "$config"
            }

            set_config_tag() {
              tag="$1"
              value="$(xml_escape "$2")"
              awk -v tag="$tag" -v value="$value" '
                BEGIN { inserted = 0 }
                $0 ~ "^[[:space:]]*<" tag ">.*</" tag ">[[:space:]]*$" {
                  next
                }
                $0 ~ "^[[:space:]]*</Config>[[:space:]]*$" {
                  print "  <" tag ">" value "</" tag ">"
                  inserted = 1
                }
                { print }
                END {
                  if (inserted == 0) {
                    exit 1
                  }
                }
              ' "$config" > "$tmp"
              cat "$tmp" > "$config"
            }

            assert_single_config_tag() {
              tag="$1"
              expected="$2"
              total="$(awk -v tag="$tag" '
                $0 ~ "^[[:space:]]*<" tag ">.*</" tag ">[[:space:]]*$" { count++ }
                END { print count + 0 }
              ' "$config")"
              matches="$(awk -v tag="$tag" -v expected="$expected" '
                $0 ~ "^[[:space:]]*<" tag ">.*</" tag ">[[:space:]]*$" {
                  value = $0
                  sub("^[[:space:]]*<" tag ">", "", value)
                  sub("</" tag ">[[:space:]]*$", "", value)
                  if (value == expected) {
                    count++
                  }
                }
                END { print count + 0 }
              ' "$config")"

              if [ "$total" -ne 1 ] || [ "$matches" -ne 1 ]; then
                echo "Radarr config.xml must contain exactly one ${tag}=${expected}; found ${matches}/${total}" >&2
                exit 1
              fi
            }

            assert_absent_config_tag() {
              tag="$1"
              total="$(awk -v tag="$tag" '
                $0 ~ "^[[:space:]]*<" tag ">.*</" tag ">[[:space:]]*$" { count++ }
                END { print count + 0 }
              ' "$config")"

              if [ "$total" -ne 0 ]; then
                echo "Radarr config.xml must not contain legacy ${tag}; found ${total}" >&2
                exit 1
              fi
            }

            : "${RADARR_POSTGRES_HOST:?}"
            : "${RADARR_POSTGRES_PORT:?}"
            : "${RADARR_POSTGRES_USER:?}"
            : "${RADARR_POSTGRES_PASSWORD:?}"
            : "${RADARR_POSTGRES_MAIN_DB:?}"
            : "${RADARR_POSTGRES_LOG_DB:?}"

            if [ ! -s "$config" ]; then
              printf '<Config>\n</Config>\n' > "$config"
            fi

            if ! grep -q '</Config>' "$config"; then
              echo "Radarr config.xml is missing a closing </Config> tag" >&2
              exit 1
            fi

            set_config_tag PostgresUser "$RADARR_POSTGRES_USER"
            set_config_tag PostgresPassword "$RADARR_POSTGRES_PASSWORD"
            set_config_tag PostgresPort "$RADARR_POSTGRES_PORT"
            set_config_tag PostgresHost "$RADARR_POSTGRES_HOST"
            set_config_tag PostgresMainDb "$RADARR_POSTGRES_MAIN_DB"
            set_config_tag PostgresLogDb "$RADARR_POSTGRES_LOG_DB"

            # AuthenticationEnabled is a legacy switch that forces Forms auth
            # before Radarr reads AuthenticationMethod. AuthenticationType is a
            # retired/incorrect auth-required key. Keep both out of the PVC.
            remove_config_tag AuthenticationEnabled
            remove_config_tag AuthenticationType
            set_config_tag AuthenticationMethod External
            set_config_tag AuthenticationRequired DisabledForLocalAddresses
            assert_absent_config_tag AuthenticationEnabled
            assert_absent_config_tag AuthenticationType
            assert_single_config_tag AuthenticationMethod External
            assert_single_config_tag AuthenticationRequired DisabledForLocalAddresses
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/radarr
          tag: 6.3.0@sha256:2b2c1c05eb3f648d2c80dfab9486147dd7bb0ad4d77fa972fc1c5de8f1da3738
        env:
          TZ: America/Los_Angeles
          PUID: "1000"
          PGID: "1000"
          DELUGE_URL: http://deluge.media.svc.cluster.local:8112
          RADARR__AUTH__METHOD: External
          RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - curl -fsS -o /dev/null http://127.0.0.1:7878/initialize.json
              failureThreshold: 36
              periodSeconds: 5
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - curl -fsS -o /dev/null http://127.0.0.1:7878/initialize.json
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - curl -fsS -o /dev/null http://127.0.0.1:7878/initialize.json
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
service:
  app:
    controller: radarr
    ports:
      http:
        port: 7878
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: radarr-config
    advancedMounts:
      radarr:
        app:
          - path: /config
        configure-postgres:
          - path: /config
  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-movies
    advancedMounts:
      radarr:
        app:
          - path: /movies
            subPath: movies
  downloads:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-downloads
    advancedMounts:
      radarr:
        app:
          - path: /downloads
            subPath: downloads
