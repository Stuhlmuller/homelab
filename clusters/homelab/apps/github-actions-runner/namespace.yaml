apiVersion: v1
kind: Namespace
metadata:
  name: github-actions-runner
  annotations:
    homelab.rst.io/privileged-namespace-justification: Host networking lets the CI runner use node IPv6 routing to reach Octelium gateway hostnames; containers are not granted privileged mode.
  labels:
    app.kubernetes.io/name: github-actions-runner
    app.kubernetes.io/part-of: homelab
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
