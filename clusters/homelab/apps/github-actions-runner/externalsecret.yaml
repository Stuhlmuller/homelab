apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-actions-runner-registration
  namespace: github-actions-runner
  labels:
    app.kubernetes.io/name: github-actions-runner
    app.kubernetes.io/part-of: homelab
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-ssm-github-actions-runner
    kind: ClusterSecretStore
  target:
    name: github-actions-runner-registration
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: github-actions-runner
          app.kubernetes.io/part-of: homelab
  data:
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: registration-token
      remoteRef:
        # checkov:skip=CKV_SECRET_6: SSM parameter path, not a secret value.
        key: /homelab/github-actions-runner/registration-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
