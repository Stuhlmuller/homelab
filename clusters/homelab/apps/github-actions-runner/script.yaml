apiVersion: v1
kind: ConfigMap
metadata:
  name: github-actions-runner-scripts
  namespace: github-actions-runner
  labels:
    app.kubernetes.io/name: github-actions-runner
    app.kubernetes.io/part-of: homelab
data:
  start-runner.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    export RUNNER_ALLOW_RUNASROOT=1

    : "${GITHUB_CONFIG_URL:?GITHUB_CONFIG_URL is required}"
    : "${RUNNER_LABELS:?RUNNER_LABELS is required}"
    : "${RUNNER_NAME_PREFIX:?RUNNER_NAME_PREFIX is required}"

    runner_dir="/home/runner"
    token_file="/var/run/github-runner/registration-token"

    if ! grep -q '^root ALL=(ALL:ALL) NOPASSWD:ALL$' /etc/sudoers; then
      printf '\nroot ALL=(ALL:ALL) NOPASSWD:ALL\n' >>/etc/sudoers
    fi
    if ! command -v xz >/dev/null 2>&1; then
      apt-get update
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends xz-utils
      rm -rf /var/lib/apt/lists/*
    fi

    cd "${runner_dir}"

    if [[ ! -f .runner ]]; then
      if [[ ! -s "${token_file}" ]]; then
        echo "registration token is missing; refresh /homelab/github-actions-runner/registration-token in SSM" >&2
        exit 1
      fi
      ./config.sh \
        --unattended \
        --replace \
        --url "${GITHUB_CONFIG_URL}" \
        --token "$(cat "${token_file}")" \
        --name "${RUNNER_NAME_PREFIX}-${HOSTNAME}" \
        --labels "${RUNNER_LABELS}" \
        --work _work
    fi

    exec ./run.sh
