apiVersion: v1
kind: Service
metadata:
  name: octelium-redis
  namespace: octelium-storage
  labels:
    app.kubernetes.io/name: octelium-redis
    app.kubernetes.io/part-of: octelium
spec:
  selector:
    app.kubernetes.io/name: octelium-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: octelium-redis
  namespace: octelium-storage
  annotations:
    checkov.io/skip1: CKV_K8S_22=Redis requires a writable data directory for append-only persistence.
    checkov.io/skip2: CKV2_K8S_6=octelium-storage is covered by networkpolicy.yaml; diff-only scans do not include sibling manifests.
  labels:
    app.kubernetes.io/name: octelium-redis
    app.kubernetes.io/part-of: octelium
spec:
  serviceName: octelium-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: octelium-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octelium-redis
        app.kubernetes.io/part-of: octelium
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: require-real-password
          image: redis:7.4.2-alpine@sha256:02419de7eddf55aa5bcf49efb74e88fa8d931b4d77c07eff8a6b2144472b6952
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
            - |
              password="$(cat /run/secrets/octelium-storage/REDIS_PASSWORD)"
              if [ -z "$password" ] || [ "$password" = "REPLACE_ME" ]; then
                echo "Octelium Redis password is empty or still uses REPLACE_ME in SSM" >&2
                exit 1
              fi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: auth
              mountPath: /run/secrets/octelium-storage
              readOnly: true
      containers:
        - name: redis
          image: redis:7.4.2-alpine@sha256:02419de7eddf55aa5bcf49efb74e88fa8d931b4d77c07eff8a6b2144472b6952
          imagePullPolicy: Always
          command:
            - redis-server
            - /run/secrets/octelium-storage/redis.conf
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: auth
              mountPath: /run/secrets/octelium-storage
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: auth
          secret:
            secretName: octelium-storage-auth
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: octelium-redis
          app.kubernetes.io/part-of: octelium
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nfs-default
        resources:
          requests:
            storage: 5Gi
