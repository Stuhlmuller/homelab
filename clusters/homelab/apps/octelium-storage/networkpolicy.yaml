apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: octelium-storage
  namespace: octelium-storage
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: octelium
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
