apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: tailnet-gateway
  namespace: istio-system
  annotations:
    homelab.rst.io/public-funnel: "false"
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*.apps.tailnet.example"

