apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: tines-tailnet
  namespace: automation
  annotations:
    homelab.rst.io/public-funnel: "false"
spec:
  hosts:
    - tines.apps.tailnet.example
  gateways:
    - istio-system/tailnet-gateway
  http:
    - route:
        - destination:
            host: tines.automation.svc.cluster.local
            port:
              number: 8080

