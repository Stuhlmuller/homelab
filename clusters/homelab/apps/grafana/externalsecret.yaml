apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: /homelab/grafana/admin-user
    - secretKey: password
      remoteRef:
        key: /homelab/grafana/admin-password
