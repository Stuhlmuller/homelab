admin:
  existingSecret: grafana-admin
  userKey: username
  passwordKey: password
extraSecretMounts:
  - name: grafana-azuread-sso
    secretName: grafana-azuread-sso
    defaultMode: 0440
    mountPath: /etc/secrets/grafana-azuread-sso
    readOnly: true
    optional: false
grafana.ini:
  server:
    root_url: https://grafana.stinkyboi.com
  auth.azuread:
    name: Entra ID
    enabled: true
    allow_sign_up: true
    auto_login: false
    client_authentication: client_secret_post
    client_id: $__file{/etc/secrets/grafana-azuread-sso/client_id}
    client_secret: $__file{/etc/secrets/grafana-azuread-sso/client_secret}
    scopes: openid email profile
    auth_url: $__file{/etc/secrets/grafana-azuread-sso/auth_url}
    token_url: $__file{/etc/secrets/grafana-azuread-sso/token_url}
    allowed_organizations: $__file{/etc/secrets/grafana-azuread-sso/allowed_organizations}
    role_attribute_path: contains(roles[*], 'GrafanaAdmin') && 'Admin' || contains(roles[*], 'Editor') && 'Editor' || 'Viewer'
    role_attribute_strict: false
    allow_assign_grafana_admin: false
    skip_org_role_sync: false
    use_pkce: true
initChownData:
  enabled: false
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
persistence:
  enabled: true
  storageClassName: nfs-default
  accessModes:
    - ReadWriteOnce
  size: 10Gi
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        access: proxy
        url: http://prometheus-kube-prometheus-alertmanager.monitoring:9093
        editable: false
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
        isDefault: true
        editable: false
        jsonData:
          httpMethod: POST
          timeInterval: 30s
          alertmanagerUid: alertmanager
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: homelab
        orgId: 1
        folder: Homelab
        folderUid: homelab
        type: file
        disableDeletion: false
        editable: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/homelab
dashboardsConfigMaps:
  homelab: grafana-dashboard-homelab-overview
alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: homelab-alertmanager
        receivers:
          - uid: homelab-alertmanager
            type: prometheus-alertmanager
            disableResolveMessage: false
            settings:
              url: http://prometheus-kube-prometheus-alertmanager.monitoring:9093
  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: homelab-alertmanager
        group_by:
          - grafana_folder
          - alertname
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: homelab-platform
        folder: Homelab
        interval: 1m
        rules:
          - uid: homelab-target-down
            title: Homelab Prometheus target down
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: sum(up == 0)
                  instant: true
                  intervalMs: 1000
                  legendFormat: Down targets
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: homelab-overview
            panelId: 7
            noDataState: OK
            execErrState: Alerting
            for: 10m
            annotations:
              summary: One or more Prometheus scrape targets are down.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/docs/validation-runbook.md
            labels:
              severity: warning
              managed_by: grafana-provisioning
          - uid: homelab-grafana-scrape-missing
            title: Grafana metrics scrape missing
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: absent(up{namespace="monitoring", service="grafana"})
                  instant: true
                  intervalMs: 1000
                  legendFormat: Grafana scrape missing
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: homelab-overview
            panelId: 8
            noDataState: OK
            execErrState: Alerting
            for: 10m
            annotations:
              summary: Prometheus is not scraping Grafana metrics.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/clusters/homelab/apps/grafana/README.md
            labels:
              severity: warning
              managed_by: grafana-provisioning
          - uid: homelab-pvc-space-low
            title: Homelab PVC space low
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: max(100 * (1 - kubelet_volume_stats_available_bytes{namespace=~"monitoring|media|automation|ai"} / kubelet_volume_stats_capacity_bytes{namespace=~"monitoring|media|automation|ai"}))
                  instant: true
                  intervalMs: 1000
                  legendFormat: Max PVC used percent
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 85
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: homelab-overview
            panelId: 4
            noDataState: OK
            execErrState: Alerting
            for: 15m
            annotations:
              summary: At least one homelab PVC is above 85 percent used.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/docs/storage-nfs.md
            labels:
              severity: critical
              managed_by: grafana-provisioning
