admin:
  existingSecret: grafana-admin
  userKey: username
  passwordKey: password
deploymentStrategy:
  type: Recreate
annotations:
  argocd.argoproj.io/sync-options: Replace=true
extraSecretMounts:
  - name: grafana-azuread-sso
    secretName: grafana-azuread-sso
    defaultMode: 0440
    mountPath: /etc/secrets/grafana-azuread-sso
    readOnly: true
    optional: false
grafana.ini:
  server:
    root_url: https://grafana.stinkyboi.com
  auth.azuread:
    name: Entra ID
    enabled: true
    allow_sign_up: true
    auto_login: false
    client_authentication: client_secret_post
    client_id: $__file{/etc/secrets/grafana-azuread-sso/client_id}
    client_secret: $__file{/etc/secrets/grafana-azuread-sso/client_secret}
    scopes: openid email profile
    auth_url: $__file{/etc/secrets/grafana-azuread-sso/auth_url}
    token_url: $__file{/etc/secrets/grafana-azuread-sso/token_url}
    allowed_organizations: $__file{/etc/secrets/grafana-azuread-sso/allowed_organizations}
    role_attribute_path: contains(roles[*], 'GrafanaAdmin') && 'Admin' || contains(roles[*], 'Editor') && 'Editor' || 'Viewer'
    role_attribute_strict: false
    allow_assign_grafana_admin: false
    skip_org_role_sync: false
    use_pkce: true
envValueFrom:
  DISCORD_WEBHOOK_URL:
    secretKeyRef:
      name: grafana-discord-webhook
      key: url
  OPENCLAW_ALERT_HOOK_TOKEN:
    secretKeyRef:
      name: grafana-openclaw-alert-hook
      key: token
podAnnotations:
  homelab.rst.io/discord-webhook-ssm-version: "2"
  homelab.rst.io/openclaw-alert-hook-ssm-version: "1"
  homelab.rst.io/alerting-provisioning-version: "4"
plugins:
  - https://github.com/grafana/grafana-infinity-datasource/releases/download/v3.8.0/yesoreyeram-infinity-datasource-3.8.0.zip;yesoreyeram-infinity-datasource
initChownData:
  enabled: false
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
persistence:
  enabled: true
  storageClassName: nfs-default
  accessModes:
    - ReadWriteOnce
  size: 10Gi
datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Alertmanager
        orgId: 1
      - name: GitHub
        orgId: 1
    prune: true
    datasources:
      - name: Alertmanager
        orgId: 1
        uid: alertmanager
        type: alertmanager
        access: proxy
        url: http://prometheus-kube-prometheus-alertmanager.monitoring:9093
        editable: false
        version: 2
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false
      - name: Prometheus
        orgId: 1
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
        isDefault: true
        editable: false
        version: 2
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: GitHub
        orgId: 1
        uid: github
        type: yesoreyeram-infinity-datasource
        access: proxy
        editable: false
        version: 1
        jsonData:
          allowedHosts:
            - https://api.github.com
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: homelab
        orgId: 1
        folder: Homelab
        folderUid: homelab
        type: file
        disableDeletion: false
        editable: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/homelab
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        folderUid: kubernetes
        type: file
        disableDeletion: false
        editable: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/kubernetes
      - name: monitoring
        orgId: 1
        folder: Monitoring
        folderUid: monitoring
        type: file
        disableDeletion: false
        editable: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/monitoring
dashboards:
  kubernetes:
    k8s-views-global:
      gnetId: 15757
      revision: 43
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-views-namespaces:
      gnetId: 15758
      revision: 46
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-views-pods:
      gnetId: 15760
      revision: 39
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-system-api-server:
      gnetId: 15761
      revision: 21
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-system-coredns:
      gnetId: 15762
      revision: 22
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
  monitoring:
    k8s-addons-prometheus:
      gnetId: 19105
      revision: 9
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
dashboardsConfigMaps:
  homelab: grafana-dashboard-homelab-overview
alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: homelab-alertmanager
        receivers:
          - uid: homelab-alertmanager
            type: prometheus-alertmanager
            disableResolveMessage: false
            settings:
              url: http://prometheus-kube-prometheus-alertmanager.monitoring:9093
          - uid: homelab-discord
            type: discord
            disableResolveMessage: false
            settings:
              use_discord_username: false
              url: $DISCORD_WEBHOOK_URL
          - uid: homelab-openclaw-alert-hook
            type: webhook
            disableResolveMessage: false
            settings:
              url: http://openclaw.ai.svc.cluster.local:8080/hooks/agent
              httpMethod: POST
              authorization_scheme: Bearer
              authorization_credentials: $OPENCLAW_ALERT_HOOK_TOKEN
              maxAlerts: "10"
              title: '{{ "{{" }} template "default.title" . {{ "}}" }}'
              message: |
                Grafana alert notification from homelab.

                Status: {{ "{{" }} .Status {{ "}}" }}
                Title: {{ "{{" }} template "default.title" . {{ "}}" }}

                {{ "{{" }} template "default.message" . {{ "}}" }}

                Triage this alert directly. If it is actionable, inspect live state when available and fix through the homelab GitOps workflow.
  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: homelab-alertmanager
        group_by:
          - grafana_folder
          - alertname
          - namespace
          - pod
          - container
          - app
          - reason
          - name
          - project
          - health_status
          - sync_status
          - workflow_name
          - head_branch
          - run_event
          - conclusion
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
  rules.yaml:
    apiVersion: 1
    deleteRules:
      - orgId: 1
        uid: homelab-octobot-deployment-unavailable
    groups:
      - orgId: 1
        name: homelab-platform
        folder: Homelab
        interval: 1m
        rules:
          - uid: homelab-target-down
            title: Homelab Prometheus target down
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: sum(up == 0)
                  instant: true
                  intervalMs: 1000
                  legendFormat: Down targets
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: homelab-overview
            panelId: 7
            noDataState: OK
            execErrState: Alerting
            for: 10m
            annotations:
              summary: One or more Prometheus scrape targets are down.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/docs/validation-runbook.md
            labels:
              severity: warning
              managed_by: grafana-provisioning
          - uid: homelab-grafana-scrape-missing
            title: Grafana metrics scrape missing
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: absent(up{namespace="monitoring", service="grafana"})
                  instant: true
                  intervalMs: 1000
                  legendFormat: Grafana scrape missing
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: homelab-overview
            panelId: 8
            noDataState: OK
            execErrState: Alerting
            for: 10m
            annotations:
              summary: Prometheus is not scraping Grafana metrics.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/clusters/homelab/apps/grafana/README.md
            labels:
              severity: warning
              managed_by: grafana-provisioning
          - uid: homelab-kubernetes-pod-crashlooping
            title: Kubernetes pod crash looping
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} > 0
                  instant: true
                  intervalMs: 1000
                  legendFormat: '{{ "{{" }} namespace {{ "}}" }}/{{ "{{" }} pod {{ "}}" }} {{ "{{" }} container {{ "}}" }} {{ "{{" }} reason {{ "}}" }}'
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            annotations:
              summary: One or more Kubernetes pod containers are stuck in CrashLoopBackOff.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/docs/validation-runbook.md
            labels:
              severity: critical
              managed_by: grafana-provisioning
          - uid: homelab-deluge-unavailable
            title: Deluge unavailable
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: |
                    (
                      kube_deployment_spec_replicas{namespace="media", deployment="deluge"} > 0
                      and
                      kube_deployment_status_replicas_available{namespace="media", deployment="deluge"} < 1
                    )
                    or absent(kube_deployment_status_replicas_available{namespace="media", deployment="deluge"})
                  instant: true
                  intervalMs: 1000
                  legendFormat: Deluge available replicas
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: Alerting
            execErrState: Alerting
            for: 5m
            annotations:
              summary: Deluge has no available Kubernetes Deployment replicas, or kube-state-metrics no longer reports the Deluge Deployment.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/clusters/homelab/apps/deluge/README.md
            labels:
              severity: critical
              managed_by: grafana-provisioning
              app: deluge
              namespace: media
          - uid: homelab-pvc-space-low
            title: Homelab PVC space low
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: max(100 * (1 - kubelet_volume_stats_available_bytes{namespace=~"monitoring|media|automation|ai"} / kubelet_volume_stats_capacity_bytes{namespace=~"monitoring|media|automation|ai"}))
                  instant: true
                  intervalMs: 1000
                  legendFormat: Max PVC used percent
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 85
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: homelab-overview
            panelId: 4
            noDataState: OK
            execErrState: Alerting
            for: 15m
            annotations:
              summary: At least one homelab PVC is above 85 percent used.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/docs/storage-nfs.md
            labels:
              severity: critical
              managed_by: grafana-provisioning
          - uid: homelab-argocd-metrics-missing
            title: Argo CD application metrics missing
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: absent(argocd_app_info)
                  instant: true
                  intervalMs: 1000
                  legendFormat: Argo CD app metrics missing
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: argocd-overview
            panelId: 1
            noDataState: OK
            execErrState: Alerting
            for: 10m
            annotations:
              summary: Prometheus is not receiving Argo CD application metrics.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/clusters/homelab/apps/grafana/README.md
            labels:
              severity: critical
              managed_by: grafana-provisioning
          - uid: homelab-argocd-app-unhealthy
            title: Argo CD application unhealthy
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: argocd_app_info{health_status=~"Degraded|Missing|Unknown"}
                  instant: true
                  intervalMs: 1000
                  legendFormat: Unhealthy application
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: argocd-overview
            panelId: 4
            noDataState: OK
            execErrState: Alerting
            for: 10m
            annotations:
              summary: One or more Argo CD Applications are not Healthy.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/docs/validation-runbook.md
            labels:
              severity: critical
              managed_by: grafana-provisioning
          - uid: homelab-argocd-app-out-of-sync
            title: Argo CD application out of sync
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: argocd_app_info{sync_status="OutOfSync"}
                  instant: true
                  intervalMs: 1000
                  legendFormat: Out-of-sync application
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: argocd-overview
            panelId: 3
            noDataState: OK
            execErrState: Alerting
            for: 30m
            annotations:
              summary: One or more Argo CD Applications have remained out of sync.
              runbook_url: https://github.com/Stuhlmuller/homelab/blob/main/docs/validation-runbook.md
            labels:
              severity: warning
              managed_by: grafana-provisioning
      - orgId: 1
        name: homelab-github
        folder: Homelab
        interval: 10m
        rules:
          - uid: homelab-github-actions-run-failed
            title: GitHub Actions workflow run failed
            condition: C
            data:
              - refId: A
                datasourceUid: github
                relativeTimeRange:
                  from: 7200
                  to: 0
                model:
                  datasource:
                    type: yesoreyeram-infinity-datasource
                    uid: github
                  columns:
                    - selector: id
                      text: run_id
                      type: number
                    - selector: name
                      text: workflow_name
                      type: string
                    - selector: head_branch
                      text: head_branch
                      type: string
                    - selector: event
                      text: run_event
                      type: string
                    - selector: conclusion
                      text: conclusion
                      type: string
                    - selector: html_url
                      text: html_url
                      type: string
                  filters: []
                  format: table
                  global_query_id: ""
                  intervalMs: 1000
                  maxDataPoints: 43200
                  parser: backend
                  refId: A
                  root_selector: workflow_runs
                  source: url
                  type: json
                  url: https://api.github.com/repos/Stuhlmuller/homelab/actions/runs
                  url_options:
                    body_content_type: application/json
                    body_form: []
                    body_graphql_query: ""
                    body_graphql_variables: ""
                    body_type: raw
                    data: ""
                    headers:
                      - key: Accept
                        value: application/vnd.github+json
                      - key: X-GitHub-Api-Version
                        value: "2026-03-10"
                    method: GET
                    params:
                      - key: status
                        value: failure
                      - key: created
                        value: ">=${__timeFrom:date:iso}"
                      - key: per_page
                        value: "10"
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
