apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: grafana-allow-required-clients
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/istio-system/sa/istio-ingressgateway
              - cluster.local/ns/monitoring/sa/grafana-alerting-cleanup-v5
              - cluster.local/ns/monitoring/sa/kiali-service-account
              - cluster.local/ns/monitoring/sa/prometheus-kube-prometheus-prometheus
              - cluster.local/ns/octelium-client/sa/octelium-client
