---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: octelium-public
  annotations:
    checkov.io/skip1: CKV_K8S_35=The tunnel UUID is non-secret routing metadata; the Cloudflare credentials JSON remains file-mounted.
    checkov.io/skip2: CKV2_K8S_6=cloudflared-egress NetworkPolicy exists in this Kustomize app; the diff-only hook scans this Deployment without the unchanged policy.
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: octelium-public
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
      app.kubernetes.io/part-of: octelium-public
  template:
    metadata:
      annotations:
        homelab.rst.io/cloudflared-config-revision: tunnel-reconnect-2026-06-18
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/part-of: octelium-public
    spec:
      serviceAccountName: cloudflared
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.6.1@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - --credentials-file
            - /etc/cloudflared/creds/credentials.json
            - run
            - $(TUNNEL_ID)
          env:
            - name: TUNNEL_ID
              valueFrom:
                secretKeyRef:
                  name: octelium-public-cloudflared-credentials
                  key: tunnel-id
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: cloudflared-config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: cloudflared-credentials
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: cloudflared-config
          configMap:
            name: octelium-public-cloudflared
        - name: cloudflared-credentials
          secret:
            secretName: octelium-public-cloudflared-credentials
