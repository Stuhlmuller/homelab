---
apiVersion: v1
kind: ConfigMap
metadata:
  name: octelium-public-cloudflared
  namespace: octelium-public
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: octelium-public
data:
  config.yaml: |
    no-autoupdate: true
    metrics: 0.0.0.0:2000
    protocol: http2
    originRequest:
      connectTimeout: 30s
      tlsTimeout: 10s
      http2Origin: true
    ingress:
      - hostname: stinkyboi.com
        service: https://istio-ingressgateway.istio-system.svc.cluster.local:443
        originRequest:
          originServerName: stinkyboi.com
          httpHostHeader: stinkyboi.com
      - hostname: octelium.stinkyboi.com
        service: https://istio-ingressgateway.istio-system.svc.cluster.local:443
        originRequest:
          originServerName: octelium.stinkyboi.com
          httpHostHeader: octelium.stinkyboi.com
      - hostname: portal.stinkyboi.com
        service: https://istio-ingressgateway.istio-system.svc.cluster.local:443
        originRequest:
          originServerName: portal.stinkyboi.com
          httpHostHeader: portal.stinkyboi.com
      - hostname: octelium-api.stinkyboi.com
        service: https://istio-ingressgateway.istio-system.svc.cluster.local:443
        originRequest:
          originServerName: octelium-api.stinkyboi.com
          httpHostHeader: octelium-api.stinkyboi.com
      - service: http_status:404
