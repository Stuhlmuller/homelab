apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: octelium-client-auth
  namespace: octelium-client
  annotations:
    homelab.rst.io/octelium-credential-ssm-version: "1"
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: octelium-client-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: auth-token
      remoteRef:
        # checkov:skip=CKV_SECRET_6: SSM parameter path, not a secret value.
        key: /homelab/octelium/client-auth-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
