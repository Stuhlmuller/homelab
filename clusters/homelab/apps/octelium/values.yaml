replicaCount: 1

image:
  repository: ghcr.io/octelium/octelium
  pullPolicy: IfNotPresent
  tag: "0.35.0@sha256:37bf93b69a6fb42d94909d840bc68542c13de5a60bf8d516ef80975daab053cb"

fullnameOverride: octelium-client

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations:
  homelab.rst.io/octelium-credential-ssm-version: "3"
  homelab.rst.io/octelium-mode: client-connector

podLabels:
  app.kubernetes.io/part-of: octelium

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    add: []
    drop:
      - ALL

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 256Mi

octelium:
  domain: octelium.stinkyboi.com
  # checkov:skip=CKV_SECRET_6: Kubernetes Secret name, not a secret value.
  authTokenSecret: octelium-client-auth
  # checkov:skip=CKV_SECRET_6: Kubernetes Secret key name, not a secret value.
  authTokenSecretKey: auth-token
  args:
    - --implementation=gvisor
    - --ip-mode=v4
    - --scope=service:argocd.homelab
    - --scope=service:compass.homelab
    - --scope=service:deluge.homelab
    - --scope=service:grafana.homelab
    - --scope=service:homelab-demo.homelab
    - --scope=service:kiali.homelab
    - --scope=service:litellm.homelab
    - --scope=service:n8n.homelab
    - --scope=service:octobot.homelab
    - --scope=service:openclaw.homelab
    - --scope=service:policy-bot.homelab
    - --scope=service:prowlarr.homelab
    - --scope=service:radarr.homelab
    - --scope=service:sonarr.homelab
  serve:
    - argocd.homelab
    - compass.homelab
    - deluge.homelab
    - grafana.homelab
    - homelab-demo.homelab
    - kiali.homelab
    - litellm.homelab
    - n8n.homelab
    - octobot.homelab
    - openclaw.homelab
    - policy-bot.homelab
    - prowlarr.homelab
    - radarr.homelab
    - sonarr.homelab
