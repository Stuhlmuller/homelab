apiVersion: apps/v1
kind: Deployment
metadata:
  name: octelium-demo
  namespace: octelium-client
  annotations:
    checkov.io/skip1: CKV2_K8S_6=octelium-demo is covered by networkpolicy.yaml; diff-only scans do not include sibling manifests.
  labels:
    app.kubernetes.io/name: octelium-demo
    app.kubernetes.io/instance: octelium-demo
    app.kubernetes.io/part-of: octelium
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: octelium-demo
      app.kubernetes.io/instance: octelium-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octelium-demo
        app.kubernetes.io/instance: octelium-demo
        app.kubernetes.io/part-of: octelium
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.9.3@sha256:0c73d438b0fe28c1d52bac0d6aafa04efe2023910378c4b436e234f56b6e9b99
          command:
            - ./podinfo
          args:
            - --port=9898
          ports:
            - name: http
              containerPort: 9898
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
---
apiVersion: v1
kind: Service
metadata:
  name: octelium-demo
  namespace: octelium-client
  labels:
    app.kubernetes.io/name: octelium-demo
    app.kubernetes.io/instance: octelium-demo
    app.kubernetes.io/part-of: octelium
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: octelium-demo
    app.kubernetes.io/instance: octelium-demo
  ports:
    - name: http
      port: 8080
      targetPort: http
