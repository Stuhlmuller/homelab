grafana:
  enabled: false
nodeExporter:
  enabled: false
defaultRules:
  rules:
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
  disabled:
    Watchdog: true
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
kubeScheduler:
  enabled: false
prometheus:
  prometheusSpec:
    retention: 15d
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: monitoring
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-default
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity =~ "warning|info"
        equal:
          - namespace
          - alertname
      - source_matchers:
          - severity = "warning"
        target_matchers:
          - severity = "info"
        equal:
          - namespace
          - alertname
      - source_matchers:
          - alertname = "InfoInhibitor"
        target_matchers:
          - severity = "info"
        equal:
          - namespace
      - target_matchers:
          - alertname = "InfoInhibitor"
    route:
      group_by:
        - grafana_folder
        - alertname
        - namespace
        - pod
        - container
        - app
        - reason
        - name
        - project
        - health_status
        - sync_status
        - workflow_name
        - head_branch
        - run_event
        - conclusion
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: homelab-notifications
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: homelab-notifications
        discord_configs:
          - send_resolved: true
            webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord-webhook/url
        webhook_configs:
          - send_resolved: true
            url: http://openclaw.ai.svc.cluster.local:8080/hooks/agent
            max_alerts: 10
            http_config:
              authorization:
                type: Bearer
                credentials_file: /etc/alertmanager/secrets/alertmanager-openclaw-alert-hook/token
    templates:
      - /etc/alertmanager/config/*.tmpl
  alertmanagerSpec:
    podMetadata:
      annotations:
        homelab.rst.io/discord-webhook-ssm-version: "2"
        homelab.rst.io/openclaw-alert-hook-ssm-version: "1"
    secrets:
      - alertmanager-discord-webhook
      - alertmanager-openclaw-alert-hook
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-default
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
