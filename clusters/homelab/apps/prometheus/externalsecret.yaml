apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord-webhook
  namespace: monitoring
  annotations:
    homelab.rst.io/discord-webhook-ssm-version: "2"
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: alertmanager-discord-webhook
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: url
      remoteRef:
        key: /homelab/grafana/discord-webhook-url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-openclaw-alert-hook
  namespace: monitoring
  annotations:
    homelab.rst.io/openclaw-alert-hook-ssm-version: "1"
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: alertmanager-openclaw-alert-hook
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: /homelab/grafana/openclaw-alert-hook-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
