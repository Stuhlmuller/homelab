---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-alerting-cleanup
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-alerting-cleanup
    app.kubernetes.io/part-of: homelab-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: grafana-allow-alerting-cleanup
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-alerting-cleanup
    app.kubernetes.io/part-of: homelab-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/monitoring/sa/grafana-alerting-cleanup
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-alerting-cleanup
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-alerting-cleanup
    app.kubernetes.io/part-of: homelab-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-alerting-cleanup
      app.kubernetes.io/part-of: homelab-monitoring
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 15012
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-alerting-cleanup
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-alerting-cleanup
    app.kubernetes.io/part-of: homelab-monitoring
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-alerting-cleanup
        app.kubernetes.io/part-of: homelab-monitoring
      annotations:
        sidecar.istio.io/inject: "true"
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      serviceAccountName: grafana-alerting-cleanup
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cleanup
          image: python:3.13-alpine@sha256:420cd0bf0f3998275875e02ecd5808168cf0843cbb4d3c536432f729247b2acc
          env:
            - name: GRAFANA_URL
              value: https://grafana.stinkyboi.com
          command:
            - python
            - -c
            - |
              import base64
              import json
              import os
              import urllib.error
              import urllib.request

              base_url = os.environ["GRAFANA_URL"].rstrip("/")
              with open("/var/run/grafana-admin/username", encoding="utf-8") as username_file:
                  username = username_file.read().strip()
              with open("/var/run/grafana-admin/password", encoding="utf-8") as password_file:
                  password = password_file.read().strip()
              auth = base64.b64encode(f"{username}:{password}".encode()).decode()

              def call(method, path, payload=None, ok=(200, 202, 204)):
                  data = None if payload is None else json.dumps(payload).encode()
                  headers = {
                      "Authorization": f"Basic {auth}",
                      "Content-Type": "application/json",
                      "X-Disable-Provenance": "true",
                  }
                  request = urllib.request.Request(
                      f"{base_url}{path}",
                      data=data,
                      headers=headers,
                      method=method,
                  )
                  try:
                      with urllib.request.urlopen(request, timeout=20) as response:
                          body = response.read().decode()
                          if response.status not in ok:
                              raise RuntimeError(f"{method} {path} returned {response.status}: {body}")
                          return response.status, body
                  except urllib.error.HTTPError as error:
                      body = error.read().decode()
                      if error.code in ok:
                          return error.code, body
                      raise RuntimeError(f"{method} {path} returned {error.code}: {body}") from error

              def delete_rule(uid):
                  status, _ = call("DELETE", f"/api/v1/provisioning/alert-rules/{uid}", ok=(200, 202, 204, 404))
                  print(f"delete {uid}: {status}")

              def update_argocd_rule():
                  status, body = call(
                      "GET",
                      "/api/v1/provisioning/alert-rules/homelab-argocd-app-out-of-sync",
                      ok=(200, 404),
                  )
                  if status == 404:
                      print("argocd rule already absent")
                      return

                  rule = json.loads(body)
                  changed = False
                  for item in rule.get("data", []):
                      model = item.get("model") or {}
                      if model.get("expr") == 'argocd_app_info{sync_status!="Synced"}':
                          model["expr"] = 'argocd_app_info{sync_status="OutOfSync"}'
                          changed = True

                  if changed:
                      call("PUT", "/api/v1/provisioning/alert-rules/homelab-argocd-app-out-of-sync", rule)
                      print("updated homelab-argocd-app-out-of-sync")
                  else:
                      print("argocd rule already uses explicit OutOfSync")

              update_argocd_rule()
              delete_rule("homelab-octobot-deployment-unavailable")

              try:
                  urllib.request.urlopen(
                      urllib.request.Request("http://127.0.0.1:15020/quitquitquit", method="POST"),
                      timeout=2,
                  ).read()
              except Exception as error:
                  print(f"sidecar shutdown skipped: {error}")
          volumeMounts:
            - name: grafana-admin
              mountPath: /var/run/grafana-admin
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
      volumes:
        - name: grafana-admin
          secret:
            secretName: grafana-admin
