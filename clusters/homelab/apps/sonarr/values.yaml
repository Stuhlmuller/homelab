serviceAccount:
  sonarr: {}
controllers:
  sonarr:
    serviceAccount:
      identifier: sonarr
    pod:
      automountServiceAccountToken: false
      annotations:
        homelab.rst.io/access-mode: "octelium"
    initContainers:
      configure-postgres:
        image:
          repository: lscr.io/linuxserver/sonarr
          tag: 4.0.19@sha256:fbb15bb4fb14d1ffe017f6be0e3fed8f1b300e4687e329767da0b61f36ba1eed
        envFrom:
          - secretRef:
              name: media-postgres-arr-env
        command:
          - /bin/sh
          - -ec
          - |
            config=/config/config.xml
            tmp="$(mktemp /tmp/sonarr-config.XXXXXXXXXX)"

            xml_escape() {
              printf '%s' "$1" \
                | sed \
                  -e 's/&/\&amp;/g' \
                  -e 's/</\&lt;/g' \
                  -e 's/>/\&gt;/g' \
                  -e 's/"/\&quot;/g' \
                  -e "s/'/\&apos;/g"
            }

            set_config_tag() {
              tag="$1"
              value="$(xml_escape "$2")"
              awk -v tag="$tag" -v value="$value" '
                BEGIN { found = 0 }
                $0 ~ "<" tag ">" {
                  print "  <" tag ">" value "</" tag ">"
                  found = 1
                  next
                }
                $0 ~ "</Config>" && found == 0 {
                  print "  <" tag ">" value "</" tag ">"
                  found = 1
                }
                { print }
              ' "$config" > "$tmp"
              cat "$tmp" > "$config"
            }

            : "${SONARR_POSTGRES_HOST:?}"
            : "${SONARR_POSTGRES_PORT:?}"
            : "${SONARR_POSTGRES_USER:?}"
            : "${SONARR_POSTGRES_PASSWORD:?}"
            : "${SONARR_POSTGRES_MAIN_DB:?}"
            : "${SONARR_POSTGRES_LOG_DB:?}"

            if [ ! -s "$config" ]; then
              printf '<Config>\n</Config>\n' > "$config"
            fi

            if ! grep -q '</Config>' "$config"; then
              echo "Sonarr config.xml is missing a closing </Config> tag" >&2
              exit 1
            fi

            set_config_tag PostgresUser "$SONARR_POSTGRES_USER"
            set_config_tag PostgresPassword "$SONARR_POSTGRES_PASSWORD"
            set_config_tag PostgresPort "$SONARR_POSTGRES_PORT"
            set_config_tag PostgresHost "$SONARR_POSTGRES_HOST"
            set_config_tag PostgresMainDb "$SONARR_POSTGRES_MAIN_DB"
            set_config_tag PostgresLogDb "$SONARR_POSTGRES_LOG_DB"
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/sonarr
          tag: 4.0.19@sha256:fbb15bb4fb14d1ffe017f6be0e3fed8f1b300e4687e329767da0b61f36ba1eed
        env:
          TZ: America/Los_Angeles
          PUID: "1000"
          PGID: "1000"
          DELUGE_URL: http://deluge.media.svc.cluster.local:8112
service:
  app:
    controller: sonarr
    ports:
      http:
        port: 8989
persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: sonarr-config
    advancedMounts:
      sonarr:
        app:
          - path: /config
        configure-postgres:
          - path: /config
  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-tv
    advancedMounts:
      sonarr:
        app:
          - path: /tv
            subPath: tv
  downloads:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-downloads
    advancedMounts:
      sonarr:
        app:
          - path: /downloads
            subPath: downloads
