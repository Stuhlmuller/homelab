apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarr-auth
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: sonarr-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-key
      remoteRef:
        key: /homelab/sonarr/api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: deluge-api-key # checkov:skip=CKV_SECRET_6: target key name, not a secret value
      remoteRef:
        key: /homelab/sonarr/deluge-api-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
