apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarr-auth
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: sonarr-auth
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: /homelab/sonarr/api-key
    - secretKey: deluge-api-key
      remoteRef:
        key: /homelab/sonarr/deluge-api-key

