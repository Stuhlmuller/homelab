apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: ai
  annotations:
    homelab.stuhlmuller.dev/generated-secret-revision: "v1"
spec:
  refreshPolicy: Periodic
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: openclaw-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: APP_SECRET
      remoteRef:
        key: /homelab/openclaw/app-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: LITELLM_TOKEN
      remoteRef:
        key: /homelab/openclaw/litellm-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: /homelab/openclaw/discord-bot-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_USERNAME
      remoteRef:
        key: /homelab/openclaw/grafana/username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_PASSWORD
      remoteRef:
        key: /homelab/openclaw/grafana/password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_ALERT_HOOK_TOKEN
      remoteRef:
        key: /homelab/grafana/openclaw-alert-hook-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: /homelab/openclaw/github-app/id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GITHUB_APP_INSTALLATION_ID
      remoteRef:
        key: /homelab/openclaw/github-app/installation-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-github-app-private-key
  namespace: ai
spec:
  refreshPolicy: Periodic
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: openclaw-github-app-private-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: private-key.pem
      remoteRef:
        key: /homelab/openclaw/github-app/private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
