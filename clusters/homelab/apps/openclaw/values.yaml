serviceAccount:
  openclaw: {}
controllers:
  openclaw:
    serviceAccount:
      identifier: openclaw
    pod:
      automountServiceAccountToken: false
      annotations:
        homelab.rst.io/openclaw-discord-bot-token-ssm-version: "2"
        homelab.rst.io/openclaw-grafana-login-ssm-version: "1"
        homelab.rst.io/openclaw-grafana-alert-hook-ssm-version: "1"
        homelab.rst.io/openclaw-github-app-credentials-ssm-version: "1"
    initContainers:
      operator-toolbox:
        image:
          repository: docker.io/nixos/nix
          tag: "2.24.11@sha256:4bfe741027f0bfbef745862cbf3b5f424ee99801c04138146c0000a28759636d"
        env:
          NIXPKGS_REF: github:NixOS/nixpkgs/29916453413845e54a65b8a1cf996842300cd299
        command:
          - /bin/sh
          - -ec
          - |
            export NIX_CONFIG="experimental-features = nix-command flakes"
            nix profile install --profile /toolbox/profile \
              "$NIXPKGS_REF#argocd" \
              "$NIXPKGS_REF#gh" \
              "$NIXPKGS_REF#jq" \
              "$NIXPKGS_REF#kubectl" \
              "$NIXPKGS_REF#nix" \
              "$NIXPKGS_REF#opentofu" \
              "$NIXPKGS_REF#pre-commit" \
              "$NIXPKGS_REF#ripgrep" \
              "$NIXPKGS_REF#talosctl" \
              "$NIXPKGS_REF#terragrunt"
            mkdir -p /nix-shared/store /nix-shared/var/nix
            nix-store -qR /toolbox/profile |
              xargs -r cp -a --target-directory=/nix-shared/store
            cp -a /nix/var/nix/db /nix-shared/var/nix/db
            chown -R 1000:1000 /nix-shared
            /toolbox/profile/bin/jq --version
            /toolbox/profile/bin/rg --version
            /toolbox/profile/bin/gh --version
            /toolbox/profile/bin/kubectl version --client=true
            /toolbox/profile/bin/argocd version --client --short
            /toolbox/profile/bin/talosctl version --client
            /toolbox/profile/bin/terragrunt --version
            /toolbox/profile/bin/tofu version
            /toolbox/profile/bin/pre-commit --version
        resources:
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            memory: 6Gi
      bootstrap-config:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: "2026.6.6@sha256:4826ca6157377e93463786d5c16852e34eede9f4bd4be55e3773cdc509762857"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            memory: 3Gi
        env:
          OPENCLAW_HOME: /data/openclaw
          OPENCLAW_CONFIG_PATH: /data/openclaw/config/openclaw.json
          OPENCLAW_STATE_DIR: /data/openclaw
          OPENCLAW_WORKSPACE_DIR: /data/openclaw/workspace
          GIT_CONFIG_GLOBAL: /data/openclaw/gitconfig
          NIX_CONFIG: experimental-features = nix-command flakes
          PATH: /toolbox/profile/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          OPENCLAW_GATEWAY_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: APP_SECRET
          GITHUB_APP_PRIVATE_KEY_PATH: /var/run/secrets/openclaw/github-app/private-key.pem
          LITELLM_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: LITELLM_TOKEN
          DISCORD_BOT_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: DISCORD_BOT_TOKEN
          GRAFANA_USERNAME:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GRAFANA_USERNAME
          GRAFANA_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GRAFANA_PASSWORD
          GRAFANA_ALERT_HOOK_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GRAFANA_ALERT_HOOK_TOKEN
          GITHUB_APP_ID:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GITHUB_APP_ID
          GITHUB_APP_INSTALLATION_ID:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GITHUB_APP_INSTALLATION_ID
        command:
          - /bin/sh
          - -ec
          - |
            : "${OPENCLAW_GATEWAY_TOKEN:?OPENCLAW_GATEWAY_TOKEN must be provided by openclaw-secrets APP_SECRET}"
            mkdir -p "$OPENCLAW_STATE_DIR" "$OPENCLAW_WORKSPACE_DIR"
            mkdir -p "$OPENCLAW_WORKSPACE_DIR/.openclaw/trash" "$OPENCLAW_STATE_DIR/src"
            mkdir -p "$(dirname "$OPENCLAW_CONFIG_PATH")"
            if ! command -v ssh-keygen >/dev/null 2>&1 && [ ! -x "$OPENCLAW_STATE_DIR/tools/usr/bin/ssh-keygen" ]; then
              mkdir -p "$OPENCLAW_STATE_DIR/apt/state/lists/partial" \
                "$OPENCLAW_STATE_DIR/apt/cache/archives/partial" \
                "$OPENCLAW_STATE_DIR/pkg-cache" \
                "$OPENCLAW_STATE_DIR/tools"
              apt-get \
                -o Dir::State="$OPENCLAW_STATE_DIR/apt/state" \
                -o Dir::Cache="$OPENCLAW_STATE_DIR/apt/cache" \
                -o Debug::NoLocking=1 \
                update
              (
                cd "$OPENCLAW_STATE_DIR/pkg-cache"
                apt-get \
                  -o Dir::State="$OPENCLAW_STATE_DIR/apt/state" \
                  -o Dir::Cache="$OPENCLAW_STATE_DIR/apt/cache" \
                  -o Debug::NoLocking=1 \
                  download openssh-client
                dpkg-deb -x "$(ls -t openssh-client_*.deb | head -n1)" "$OPENCLAW_STATE_DIR/tools"
              )
            fi
            SSH_KEYGEN="$(command -v ssh-keygen || printf '%s\n' "$OPENCLAW_STATE_DIR/tools/usr/bin/ssh-keygen")"
            SIGNING_KEY="$OPENCLAW_STATE_DIR/signing/claw_ed25519"
            mkdir -p "$OPENCLAW_STATE_DIR/signing" "$OPENCLAW_STATE_DIR/git"
            chmod 700 "$OPENCLAW_STATE_DIR/signing"
            if [ ! -s "$SIGNING_KEY" ]; then
              "$SSH_KEYGEN" -q -t ed25519 -N '' -C 'Claw homelab commit signing' -f "$SIGNING_KEY"
            fi
            chmod 600 "$SIGNING_KEY"
            chmod 644 "$SIGNING_KEY.pub"
            printf 'claw %s\n' "$(cat "$SIGNING_KEY.pub")" > "$OPENCLAW_STATE_DIR/git/allowed_signers"
            touch "$GIT_CONFIG_GLOBAL"
            git config --global --replace-all safe.directory "$OPENCLAW_WORKSPACE_DIR"
            git config --global --add safe.directory "$OPENCLAW_STATE_DIR/src/*"
            git config --global user.name 'Claw'
            git config --global user.email 'claw@openclaw.local'
            git config --global gpg.format ssh
            git config --global user.signingkey "$SIGNING_KEY.pub"
            git config --global gpg.ssh.program "$SSH_KEYGEN"
            git config --global gpg.ssh.allowedSignersFile "$OPENCLAW_STATE_DIR/git/allowed_signers"
            git config --global commit.gpgsign true
            git config --global log.showSignature true
            if [ ! -s "$OPENCLAW_CONFIG_PATH" ]; then
              printf '{}\n' > "$OPENCLAW_CONFIG_PATH"
            fi

            openclaw doctor --fix --non-interactive
            openclaw config validate

            openclaw config set --strict-json \
              gateway.mode \
              '"local"'

            openclaw config set --strict-json \
              gateway.auth.mode \
              '"token"'

            openclaw config set \
              gateway.auth.token \
              --ref-provider default \
              --ref-source env \
              --ref-id OPENCLAW_GATEWAY_TOKEN

            openclaw config set --strict-json \
              gateway.controlUi.allowedOrigins \
              '["https://openclaw.stinkyboi.com","http://openclaw.homelab","https://openclaw.homelab"]'

            if [ -z "${GRAFANA_ALERT_HOOK_TOKEN:-}" ] || [ "$GRAFANA_ALERT_HOOK_TOKEN" = "REPLACE_ME" ]; then
              echo "GRAFANA_ALERT_HOOK_TOKEN is not populated; skipping hooks bootstrap"
            else
              openclaw config set --strict-json \
                hooks.enabled \
                'true'
              openclaw config set --strict-json \
                hooks.path \
                '"/hooks"'
              HOOK_TOKEN_JSON="$(python3 -c 'import json, os; print(json.dumps(os.environ["GRAFANA_ALERT_HOOK_TOKEN"]))')"
              openclaw config set --strict-json \
                hooks.token \
                "$HOOK_TOKEN_JSON"
              openclaw config set --strict-json \
                hooks.defaultSessionKey \
                '"agent:main:hooks:grafana-alerts"'
              openclaw config set --strict-json \
                hooks.allowedAgentIds \
                '["main"]'
              openclaw config set --strict-json \
                hooks.maxBodyBytes \
                '65536'
              openclaw config set --strict-json \
                hooks.allowRequestSessionKey \
                'false'
            fi

            openclaw config set --strict-json \
              plugins.entries.codex.enabled \
              'true'

            openclaw config set --strict-json \
              plugins.entries.memory-wiki.enabled \
              'true'

            openclaw config patch --stdin <<'OPENCLAW_MODEL_PATCH'
            {
              "agents": {
                "defaults": {
                  "model": {
                    "primary": "openai/gpt-5.5"
                  },
                  "models": {
                    "openai/gpt-5.5": {
                      "agentRuntime": {
                        "id": "codex"
                      }
                    }
                  }
                }
              }
            }
            OPENCLAW_MODEL_PATCH

            openclaw config set --strict-json \
              agents.defaults.sandbox.mode \
              '"off"'

            openclaw config set --strict-json \
              tools.fs.workspaceOnly \
              'true'

            if [ -z "${DISCORD_BOT_TOKEN:-}" ] || [ "$DISCORD_BOT_TOKEN" = "REPLACE_ME" ]; then
              echo "DISCORD_BOT_TOKEN is not populated; skipping Discord channel bootstrap"
            else
              echo "DISCORD_BOT_TOKEN is populated; installing and enabling the Discord channel plugin"
              if ! openclaw plugins info discord >/dev/null 2>&1; then
                openclaw plugins install clawhub:@openclaw/discord
              fi
              openclaw plugins enable discord
              openclaw config set --strict-json \
                channels.discord.enabled \
                'true'
              openclaw config set \
                channels.discord.token \
                --ref-provider default \
                --ref-source env \
                --ref-id DISCORD_BOT_TOKEN
            fi
    containers:
      app:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: "2026.6.6@sha256:4826ca6157377e93463786d5c16852e34eede9f4bd4be55e3773cdc509762857"
        env:
          OPENCLAW_HOME: /data/openclaw
          OPENCLAW_CONFIG_PATH: /data/openclaw/config/openclaw.json
          OPENCLAW_STATE_DIR: /data/openclaw
          OPENCLAW_WORKSPACE_DIR: /data/openclaw/workspace
          GIT_CONFIG_GLOBAL: /data/openclaw/gitconfig
          NIX_CONFIG: experimental-features = nix-command flakes
          PATH: /toolbox/profile/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          OPENCLAW_GATEWAY_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: APP_SECRET
          GITHUB_APP_PRIVATE_KEY_PATH: /var/run/secrets/openclaw/github-app/private-key.pem
          LITELLM_BASE_URL: http://litellm.ai.svc.cluster.local:4000
          LITELLM_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: LITELLM_TOKEN
          DISCORD_BOT_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: DISCORD_BOT_TOKEN
          GRAFANA_USERNAME:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GRAFANA_USERNAME
          GRAFANA_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GRAFANA_PASSWORD
          GRAFANA_ALERT_HOOK_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GRAFANA_ALERT_HOOK_TOKEN
          GITHUB_APP_ID:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GITHUB_APP_ID
          GITHUB_APP_INSTALLATION_ID:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: GITHUB_APP_INSTALLATION_ID
        resources:
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            memory: 6Gi
      proxy:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: "2026.6.6@sha256:4826ca6157377e93463786d5c16852e34eede9f4bd4be55e3773cdc509762857"
        command:
          - python3
          - -u
          - -c
          - |
            import asyncio
            import contextlib

            LISTEN_HOST = "0.0.0.0"
            LISTEN_PORT = 8080
            TARGET_HOST = "127.0.0.1"
            TARGET_PORT = 18789

            async def pipe(reader, writer):
                try:
                    while data := await reader.read(65536):
                        writer.write(data)
                        await writer.drain()
                except (BrokenPipeError, ConnectionError):
                    pass
                finally:
                    with contextlib.suppress(Exception):
                        writer.write_eof()
                    writer.close()
                    with contextlib.suppress(Exception):
                        await writer.wait_closed()

            async def handle(client_reader, client_writer):
                peer = client_writer.get_extra_info("peername")
                try:
                    upstream_reader, upstream_writer = await asyncio.open_connection(
                        TARGET_HOST,
                        TARGET_PORT,
                    )
                except OSError as exc:
                    print(f"failed to connect upstream for {peer}: {exc}", flush=True)
                    client_writer.close()
                    with contextlib.suppress(Exception):
                        await client_writer.wait_closed()
                    return

                await asyncio.gather(
                    pipe(client_reader, upstream_writer),
                    pipe(upstream_reader, client_writer),
                    return_exceptions=True,
                )

            async def main():
                server = await asyncio.start_server(
                    handle,
                    LISTEN_HOST,
                    LISTEN_PORT,
                    backlog=256,
                )
                print(
                    f"proxying {LISTEN_HOST}:{LISTEN_PORT} to {TARGET_HOST}:{TARGET_PORT}",
                    flush=True,
                )
                async with server:
                    await server.serve_forever()

            asyncio.run(main())
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - python3
                  - -c
                  - |
                    import socket
                    with socket.create_connection(("127.0.0.1", 18789), timeout=2):
                        pass
              failureThreshold: 3
              periodSeconds: 5
              timeoutSeconds: 3
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
service:
  app:
    controller: openclaw
    ports:
      http:
        port: 8080
persistence:
  config:
    enabled: true
    storageClass: nfs-default
    size: 10Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      openclaw:
        app:
          - path: /data
        bootstrap-config:
          - path: /data
        proxy:
          - path: /data
  plugin-cache:
    enabled: true
    type: emptyDir
    advancedMounts:
      openclaw:
        app:
          - path: /data/openclaw/npm
        bootstrap-config:
          - path: /data/openclaw/npm
  plugin-extensions:
    enabled: true
    type: emptyDir
    advancedMounts:
      openclaw:
        app:
          - path: /data/openclaw/extensions
        bootstrap-config:
          - path: /data/openclaw/extensions
  operator-toolbox:
    enabled: true
    type: emptyDir
    advancedMounts:
      openclaw:
        operator-toolbox:
          - path: /toolbox
        app:
          - path: /toolbox
            readOnly: true
        bootstrap-config:
          - path: /toolbox
            readOnly: true
  operator-nix-store:
    enabled: true
    type: emptyDir
    advancedMounts:
      openclaw:
        operator-toolbox:
          - path: /nix-shared
        app:
          - path: /nix
        bootstrap-config:
          - path: /nix
  github-app-private-key:
    enabled: true
    type: secret
    name: openclaw-github-app-private-key
    items:
      - key: private-key.pem
        path: private-key.pem
    advancedMounts:
      openclaw:
        app:
          - path: /var/run/secrets/openclaw/github-app
            readOnly: true
        bootstrap-config:
          - path: /var/run/secrets/openclaw/github-app
            readOnly: true
