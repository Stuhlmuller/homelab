controllers:
  openclaw:
    containers:
      app:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: "2026.3.1@sha256:dcf11a3a97a9b0e42dd41fcd4891533e77ff72e7b0380c743177bfbfd6f38b2d"
          digest: sha256:dcf11a3a97a9b0e42dd41fcd4891533e77ff72e7b0380c743177bfbfd6f38b2d
        env:
          LITELLM_BASE_URL: http://litellm.ai.svc.cluster.local:4000
        envFrom:
          - secretRef:
              name: openclaw-secrets
service:
  app:
    controller: openclaw
    ports:
      http:
        port: 8080
persistence:
  config:
    enabled: true
    storageClass: nfs-default
    size: 10Gi
    accessMode: ReadWriteOnce
    globalMounts:
      - path: /data
