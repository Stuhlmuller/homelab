serviceAccount:
  openclaw: {}
controllers:
  openclaw:
    serviceAccount:
      identifier: openclaw
    pod:
      automountServiceAccountToken: false
      annotations:
        homelab.rst.io/openclaw-discord-bot-token-ssm-version: "2"
        homelab.rst.io/openclaw-github-app-credentials-ssm-version: "1"
    initContainers:
      bootstrap-config:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: "2026.5.27@sha256:95f4e860a1490e6e83f095d0bb1d2b5c7ac74e1cb62eedad08deb179e831a6de"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            memory: 3Gi
        env:
          OPENCLAW_HOME: /data/openclaw
          OPENCLAW_CONFIG_PATH: /data/openclaw/config/openclaw.json
          OPENCLAW_STATE_DIR: /data/openclaw
          OPENCLAW_WORKSPACE_DIR: /data/openclaw/workspace
          GIT_CONFIG_GLOBAL: /data/openclaw/gitconfig
          OPENCLAW_GATEWAY_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: APP_SECRET
          GITHUB_APP_PRIVATE_KEY_PATH: /var/run/secrets/openclaw/github-app/private-key.pem
        envFrom:
          - secretRef:
              name: openclaw-secrets
        command:
          - /bin/sh
          - -ec
          - |
            : "${OPENCLAW_GATEWAY_TOKEN:?OPENCLAW_GATEWAY_TOKEN must be provided by openclaw-secrets APP_SECRET}"
            mkdir -p "$OPENCLAW_STATE_DIR" "$OPENCLAW_WORKSPACE_DIR"
            mkdir -p "$OPENCLAW_WORKSPACE_DIR/.openclaw/trash" "$OPENCLAW_STATE_DIR/src"
            mkdir -p "$(dirname "$OPENCLAW_CONFIG_PATH")"
            if ! command -v ssh-keygen >/dev/null 2>&1 && [ ! -x "$OPENCLAW_STATE_DIR/tools/usr/bin/ssh-keygen" ]; then
              mkdir -p "$OPENCLAW_STATE_DIR/apt/state/lists/partial" \
                "$OPENCLAW_STATE_DIR/apt/cache/archives/partial" \
                "$OPENCLAW_STATE_DIR/pkg-cache" \
                "$OPENCLAW_STATE_DIR/tools"
              apt-get \
                -o Dir::State="$OPENCLAW_STATE_DIR/apt/state" \
                -o Dir::Cache="$OPENCLAW_STATE_DIR/apt/cache" \
                -o Debug::NoLocking=1 \
                update
              (
                cd "$OPENCLAW_STATE_DIR/pkg-cache"
                apt-get \
                  -o Dir::State="$OPENCLAW_STATE_DIR/apt/state" \
                  -o Dir::Cache="$OPENCLAW_STATE_DIR/apt/cache" \
                  -o Debug::NoLocking=1 \
                  download openssh-client
                dpkg-deb -x "$(ls -t openssh-client_*.deb | head -n1)" "$OPENCLAW_STATE_DIR/tools"
              )
            fi
            SSH_KEYGEN="$(command -v ssh-keygen || printf '%s\n' "$OPENCLAW_STATE_DIR/tools/usr/bin/ssh-keygen")"
            SIGNING_KEY="$OPENCLAW_STATE_DIR/signing/claw_ed25519"
            mkdir -p "$OPENCLAW_STATE_DIR/signing" "$OPENCLAW_STATE_DIR/git"
            chmod 700 "$OPENCLAW_STATE_DIR/signing"
            if [ ! -s "$SIGNING_KEY" ]; then
              "$SSH_KEYGEN" -q -t ed25519 -N '' -C 'Claw homelab commit signing' -f "$SIGNING_KEY"
            fi
            chmod 600 "$SIGNING_KEY"
            chmod 644 "$SIGNING_KEY.pub"
            printf 'claw %s\n' "$(cat "$SIGNING_KEY.pub")" > "$OPENCLAW_STATE_DIR/git/allowed_signers"
            touch "$GIT_CONFIG_GLOBAL"
            git config --global --replace-all safe.directory "$OPENCLAW_WORKSPACE_DIR"
            git config --global --add safe.directory "$OPENCLAW_STATE_DIR/src/*"
            git config --global user.name 'Claw'
            git config --global user.email 'claw@openclaw.local'
            git config --global gpg.format ssh
            git config --global user.signingkey "$SIGNING_KEY.pub"
            git config --global gpg.ssh.program "$SSH_KEYGEN"
            git config --global gpg.ssh.allowedSignersFile "$OPENCLAW_STATE_DIR/git/allowed_signers"
            git config --global commit.gpgsign true
            git config --global log.showSignature true
            if [ ! -s "$OPENCLAW_CONFIG_PATH" ]; then
              printf '{}\n' > "$OPENCLAW_CONFIG_PATH"
            fi

            if ! openclaw config validate; then
              openclaw doctor --fix --non-interactive
            fi

            openclaw config set --strict-json \
              gateway.mode \
              '"local"'

            openclaw config set --strict-json \
              gateway.auth.mode \
              '"token"'

            openclaw config set \
              gateway.auth.token \
              --ref-provider default \
              --ref-source env \
              --ref-id OPENCLAW_GATEWAY_TOKEN

            openclaw config set --strict-json \
              gateway.controlUi.allowedOrigins \
              '["https://openclaw.stinkyboi.com"]'

            openclaw config set --strict-json \
              plugins.entries.codex.enabled \
              'true'

            openclaw config set --strict-json \
              plugins.entries.memory-wiki.enabled \
              'true'

            openclaw config set --strict-json \
              agents.defaults.model \
              '{"primary":"openai/gpt-5.5"}'

            if [ -z "${DISCORD_BOT_TOKEN:-}" ] || [ "$DISCORD_BOT_TOKEN" = "REPLACE_ME" ]; then
              echo "DISCORD_BOT_TOKEN is not populated; skipping Discord channel bootstrap"
            else
              echo "DISCORD_BOT_TOKEN is populated; installing and enabling the Discord channel plugin"
              if ! openclaw plugins info discord >/dev/null 2>&1; then
                openclaw plugins install clawhub:@openclaw/discord
              fi
              openclaw plugins enable discord
              openclaw config set --strict-json \
                channels.discord.enabled \
                'true'
              openclaw config set \
                channels.discord.token \
                --ref-provider default \
                --ref-source env \
                --ref-id DISCORD_BOT_TOKEN
            fi
    containers:
      app:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: "2026.5.27@sha256:95f4e860a1490e6e83f095d0bb1d2b5c7ac74e1cb62eedad08deb179e831a6de"
        env:
          OPENCLAW_HOME: /data/openclaw
          OPENCLAW_CONFIG_PATH: /data/openclaw/config/openclaw.json
          OPENCLAW_STATE_DIR: /data/openclaw
          OPENCLAW_WORKSPACE_DIR: /data/openclaw/workspace
          GIT_CONFIG_GLOBAL: /data/openclaw/gitconfig
          OPENCLAW_GATEWAY_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: APP_SECRET
          GITHUB_APP_PRIVATE_KEY_PATH: /var/run/secrets/openclaw/github-app/private-key.pem
          LITELLM_BASE_URL: http://litellm.ai.svc.cluster.local:4000
        envFrom:
          - secretRef:
              name: openclaw-secrets
        resources:
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            memory: 6Gi
      proxy:
        image:
          repository: ghcr.io/openclaw/openclaw
          tag: "2026.5.27@sha256:95f4e860a1490e6e83f095d0bb1d2b5c7ac74e1cb62eedad08deb179e831a6de"
        command:
          - python3
          - -u
          - -c
          - |
            import asyncio
            import contextlib

            LISTEN_HOST = "0.0.0.0"
            LISTEN_PORT = 8080
            TARGET_HOST = "127.0.0.1"
            TARGET_PORT = 18789

            async def pipe(reader, writer):
                try:
                    while data := await reader.read(65536):
                        writer.write(data)
                        await writer.drain()
                except (BrokenPipeError, ConnectionError):
                    pass
                finally:
                    with contextlib.suppress(Exception):
                        writer.write_eof()
                    writer.close()
                    with contextlib.suppress(Exception):
                        await writer.wait_closed()

            async def handle(client_reader, client_writer):
                peer = client_writer.get_extra_info("peername")
                try:
                    upstream_reader, upstream_writer = await asyncio.open_connection(
                        TARGET_HOST,
                        TARGET_PORT,
                    )
                except OSError as exc:
                    print(f"failed to connect upstream for {peer}: {exc}", flush=True)
                    client_writer.close()
                    with contextlib.suppress(Exception):
                        await client_writer.wait_closed()
                    return

                await asyncio.gather(
                    pipe(client_reader, upstream_writer),
                    pipe(upstream_reader, client_writer),
                    return_exceptions=True,
                )

            async def main():
                server = await asyncio.start_server(
                    handle,
                    LISTEN_HOST,
                    LISTEN_PORT,
                    backlog=256,
                )
                print(
                    f"proxying {LISTEN_HOST}:{LISTEN_PORT} to {TARGET_HOST}:{TARGET_PORT}",
                    flush=True,
                )
                async with server:
                    await server.serve_forever()

            asyncio.run(main())
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - python3
                  - -c
                  - |
                    import socket
                    with socket.create_connection(("127.0.0.1", 18789), timeout=2):
                        pass
              failureThreshold: 3
              periodSeconds: 5
              timeoutSeconds: 3
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
service:
  app:
    controller: openclaw
    ports:
      http:
        port: 8080
persistence:
  config:
    enabled: true
    storageClass: nfs-default
    size: 10Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      openclaw:
        app:
          - path: /data
        bootstrap-config:
          - path: /data
        proxy:
          - path: /data
  plugin-cache:
    enabled: true
    type: emptyDir
    advancedMounts:
      openclaw:
        app:
          - path: /data/openclaw/npm
        bootstrap-config:
          - path: /data/openclaw/npm
  plugin-extensions:
    enabled: true
    type: emptyDir
    advancedMounts:
      openclaw:
        app:
          - path: /data/openclaw/extensions
        bootstrap-config:
          - path: /data/openclaw/extensions
  github-app-private-key:
    enabled: true
    type: secret
    name: openclaw-github-app-private-key
    items:
      - key: private-key.pem
        path: private-key.pem
    advancedMounts:
      openclaw:
        app:
          - path: /var/run/secrets/openclaw/github-app
            readOnly: true
        bootstrap-config:
          - path: /var/run/secrets/openclaw/github-app
            readOnly: true
