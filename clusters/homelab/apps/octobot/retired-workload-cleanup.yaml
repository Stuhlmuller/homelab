---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: retired-workload-cleanup
  namespace: finance
  labels:
    app.kubernetes.io/name: retired-workload-cleanup
    app.kubernetes.io/part-of: homelab-finance
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: retired-workload-cleanup
  namespace: finance
  labels:
    app.kubernetes.io/name: retired-workload-cleanup
    app.kubernetes.io/part-of: homelab-finance
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - delete
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: retired-workload-cleanup
  namespace: finance
  labels:
    app.kubernetes.io/name: retired-workload-cleanup
    app.kubernetes.io/part-of: homelab-finance
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: retired-workload-cleanup
subjects:
  - kind: ServiceAccount
    name: retired-workload-cleanup
    namespace: finance
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: retired-finance-workload-cleanup
  labels:
    app.kubernetes.io/name: retired-workload-cleanup
    app.kubernetes.io/part-of: homelab-finance
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups:
      - ""
    resources:
      - persistentvolumes
    verbs:
      - delete
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: retired-finance-workload-cleanup
  labels:
    app.kubernetes.io/name: retired-workload-cleanup
    app.kubernetes.io/part-of: homelab-finance
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: retired-finance-workload-cleanup
subjects:
  - kind: ServiceAccount
    name: retired-workload-cleanup
    namespace: finance
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: retired-workload-cleanup
  namespace: finance
  labels:
    app.kubernetes.io/name: retired-workload-cleanup
    app.kubernetes.io/part-of: homelab-finance
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: retired-workload-cleanup
      app.kubernetes.io/part-of: homelab-finance
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
apiVersion: batch/v1
kind: Job
metadata:
  name: retired-workload-cleanup
  namespace: finance
  labels:
    app.kubernetes.io/name: retired-workload-cleanup
    app.kubernetes.io/part-of: homelab-finance
  annotations:
    checkov.io/skip1: CKV_K8S_38=Cleanup job needs a short-lived service account token to call the Kubernetes API.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retired-workload-cleanup
        app.kubernetes.io/part-of: homelab-finance
    spec:
      automountServiceAccountToken: true
      restartPolicy: Never
      serviceAccountName: retired-workload-cleanup
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cleanup
          image: alpine/k8s:1.33.1@sha256:7f8133af0dd210cb5b168f889c5bc77dd65ecc935f3e3cb72d1b98ff96bfed40
          env:
            - name: HOME
              value: /tmp
          command:
            - /bin/sh
            - -ec
            - |
              selector="app.kubernetes.io/instance=hummingbot"

              claims="$(kubectl -n finance get pvc -l "${selector}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')"
              if [ -n "${claims}" ]; then
                printf '%s\n' "${claims}" | while IFS= read -r claim; do
                  [ -n "${claim}" ] || continue
                  pvs="$(
                    kubectl get pv -o jsonpath='{range .items[?(@.spec.claimRef.namespace=="finance")]}{.metadata.name}{"\t"}{.spec.claimRef.name}{"\n"}{end}' \
                      | awk -v claim="${claim}" '$2 == claim {print $1}'
                  )"

                  kubectl -n finance delete pvc "${claim}" --ignore-not-found=true

                  if [ -n "${pvs}" ]; then
                    printf '%s\n' "${pvs}" | while IFS= read -r pv; do
                      [ -n "${pv}" ] || continue
                      kubectl delete pv "${pv}" --ignore-not-found=true
                    done
                  fi
                done
              fi

              find /homelab -mindepth 1 -maxdepth 1 -type d \
                \( -name 'finance-hummingbot-*' -o -name 'archived-finance-hummingbot-*' \) \
                -print -exec rm -rf -- {} +
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: homelab-nfs
              mountPath: /homelab
      volumes:
        - name: tmp
          emptyDir: {}
        - name: homelab-nfs
          nfs:
            server: 10.1.0.2
            path: /homelab
