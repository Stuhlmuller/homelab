apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: octobot-tailnet
  namespace: finance
  annotations:
    homelab.rst.io/public-funnel: "false"
spec:
  hosts:
    - octobot.stinkyboi.com
  gateways:
    - istio-system/tailnet-gateway
  http:
    - route:
        - destination:
            host: octobot.finance.svc.cluster.local
            port:
              number: 5001
