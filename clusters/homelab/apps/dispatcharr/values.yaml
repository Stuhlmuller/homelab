serviceAccount:
  dispatcharr: {}
controllers:
  dispatcharr:
    serviceAccount:
      identifier: dispatcharr
    strategy: Recreate
    pod:
      automountServiceAccountToken: false
      annotations:
        homelab.rst.io/access-mode: "octelium"
    containers:
      app:
        image:
          repository: ghcr.io/dispatcharr/dispatcharr
          tag: latest@sha256:3eb0ec779f3437ec64c08a9b3f545a355a8f512f3740cdeaac42b80f1021637d
        envFrom:
          - secretRef:
              name: dispatcharr-postgres-env
        env:
          TZ: America/Los_Angeles
          DISPATCHARR_ENV: modular
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          CELERY_BROKER_URL: redis://localhost:6379/0
          DISPATCHARR_LOG_LEVEL: info
          DISPATCHARR_ENABLE_IP_LOOKUP: "false"
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 9191
              failureThreshold: 12
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 9191
              failureThreshold: 6
              periodSeconds: 30
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            memory: 4Gi
      celery:
        image:
          repository: ghcr.io/dispatcharr/dispatcharr
          tag: latest@sha256:3eb0ec779f3437ec64c08a9b3f545a355a8f512f3740cdeaac42b80f1021637d
        command:
          - /app/docker/entrypoint.celery.sh
        envFrom:
          - secretRef:
              name: dispatcharr-postgres-env
        env:
          TZ: America/Los_Angeles
          DISPATCHARR_ENV: modular
          DISPATCHARR_PORT: "9191"
          DISPATCHARR_WEB_HOST: localhost
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          CELERY_BROKER_URL: redis://localhost:6379/0
          DISPATCHARR_LOG_LEVEL: info
          DISPATCHARR_ENABLE_IP_LOOKUP: "false"
          DJANGO_SETTINGS_MODULE: dispatcharr.settings
          PYTHONUNBUFFERED: "1"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 2Gi
      redis:
        image:
          repository: redis
          tag: 8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 6379
              failureThreshold: 6
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 6379
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
service:
  app:
    controller: dispatcharr
    ports:
      http:
        port: 9191
persistence:
  data:
    enabled: true
    storageClass: nfs-default
    size: 20Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      dispatcharr:
        app:
          - path: /data
        celery:
          - path: /data
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 512Mi
    advancedMounts:
      dispatcharr:
        app:
          - path: /dev/shm
        celery:
          - path: /dev/shm
