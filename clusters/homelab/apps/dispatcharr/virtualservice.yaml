apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: dispatcharr-octelium
  namespace: media
  annotations:
    homelab.rst.io/access-plane: octelium
    homelab.rst.io/public-funnel: "false"
spec:
  hosts:
    - dispatcharr.stinkyboi.com
  gateways:
    - istio-system/tailnet-gateway
  http:
    - route:
        - destination:
            host: dispatcharr.media.svc.cluster.local
            port:
              number: 9191
