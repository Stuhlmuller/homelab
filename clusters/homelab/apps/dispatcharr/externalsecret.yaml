apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dispatcharr-postgres-env
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    homelab.stuhlmuller.dev/generated-secret-revision: "v1"
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: dispatcharr-postgres-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        POSTGRES_HOST: dispatcharr-postgres.media.svc.cluster.local
        POSTGRES_PORT: "5432"
        POSTGRES_DB: dispatcharr
        POSTGRES_USER: dispatcharr
        POSTGRES_PASSWORD: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: /homelab/media-postgres/dispatcharr-app-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
