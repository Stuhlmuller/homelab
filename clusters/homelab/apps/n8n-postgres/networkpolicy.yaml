apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: n8n-postgres
  namespace: automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: n8n-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: n8n
      ports:
        - protocol: TCP
          port: 5432
