apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-postgres-initdb
  namespace: automation
data:
  00-create-n8n-database.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    app_password="$(cat /run/secrets/n8n-postgres/POSTGRES_APP_PASSWORD)"

    psql \
      -v ON_ERROR_STOP=1 \
      -v app_password="$app_password" \
      --username "$POSTGRES_USER" \
      --dbname "$POSTGRES_DB" <<'SQL'
    CREATE USER n8n WITH PASSWORD :'app_password';
    CREATE DATABASE n8n OWNER n8n;
    GRANT ALL PRIVILEGES ON DATABASE n8n TO n8n;
    \connect n8n
    GRANT ALL ON SCHEMA public TO n8n;
    ALTER SCHEMA public OWNER TO n8n;
    SQL
