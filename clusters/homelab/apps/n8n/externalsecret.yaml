apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-secrets
  namespace: automation
  annotations:
    homelab.stuhlmuller.dev/generated-secret-revision: "v1"
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: n8n-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # checkov:skip=CKV_SECRET_6: ExternalSecret target key name, not a secret value.
    - secretKey: N8N_BOOTSTRAP_ENCRYPTION_KEY
      remoteRef:
        key: /homelab/n8n/encryption-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
