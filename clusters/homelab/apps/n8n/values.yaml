serviceAccount:
  n8n: {}
controllers:
  n8n:
    serviceAccount:
      identifier: n8n
    pod:
      automountServiceAccountToken: false
    strategy: Recreate
    initContainers:
      wait-for-postgres:
        image:
          repository: postgres
          tag: 18.4-bookworm@sha256:501c9112cb737119b90618d7c09ad4eaab243e4b370050eb280061284cd2ed63
        env:
          DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/n8n-postgres/DB_POSTGRESDB_PASSWORD
        command:
          - /bin/sh
          - -ec
          - |
            : "${DB_POSTGRESDB_PASSWORD_FILE:?DB_POSTGRESDB_PASSWORD_FILE must point at the n8n Postgres client secret}"
            password="$(cat "$DB_POSTGRESDB_PASSWORD_FILE")"
            export PGPASSWORD="$password"

            for attempt in $(seq 1 60); do
              if psql \
                "host=n8n-postgres.automation.svc.cluster.local port=5432 user=n8n dbname=n8n connect_timeout=5" \
                -c 'select 1' >/dev/null; then
                exit 0
              fi

              echo "waiting for n8n-postgres to accept authenticated connections (${attempt}/60)" >&2
              sleep 2
            done

            echo "n8n-postgres did not become ready in time" >&2
            exit 1
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
    containers:
      app:
        image:
          repository: docker.n8n.io/n8nio/n8n
          tag: "2.25.5@sha256:08862289f9e9b387d91eab66a74d40d307c0c9b74d2504866f8fe61e9063c838"
        env:
          TZ: America/Los_Angeles
          GENERIC_TIMEZONE: America/Los_Angeles
          N8N_HOST: n8n.stinkyboi.com
          N8N_PORT: "5678"
          N8N_PROTOCOL: https
          N8N_PROXY_HOPS: "1"
          N8N_SECURE_COOKIE: "true"
          N8N_EDITOR_BASE_URL: https://n8n.stinkyboi.com
          WEBHOOK_URL: https://n8n-webhook.tail67beb.ts.net/
          DB_TYPE: postgresdb
          DB_POSTGRESDB_HOST: n8n-postgres.automation.svc.cluster.local
          DB_POSTGRESDB_PORT: "5432"
          DB_POSTGRESDB_DATABASE: n8n
          DB_POSTGRESDB_USER: n8n
          DB_POSTGRESDB_SCHEMA: public
          DB_POSTGRESDB_POOL_SIZE: "4"
          DB_POSTGRESDB_CONNECTION_TIMEOUT: "30000"
          DB_POSTGRESDB_IDLE_CONNECTION_TIMEOUT: "30000"
          DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/n8n-postgres/DB_POSTGRESDB_PASSWORD
          N8N_BOOTSTRAP_ENCRYPTION_KEY:
            valueFrom:
              secretKeyRef:
                name: n8n-secrets
                key: N8N_BOOTSTRAP_ENCRYPTION_KEY
        command:
          - /bin/sh
          - -ec
          - |
            : "${DB_POSTGRESDB_PASSWORD_FILE:?DB_POSTGRESDB_PASSWORD_FILE must point at the n8n Postgres client secret}"
            if [ ! -s "$DB_POSTGRESDB_PASSWORD_FILE" ]; then
              echo "n8n Postgres password file is missing or empty" >&2
              exit 1
            fi

            if [ ! -s /home/node/.n8n/config ]; then
              : "${N8N_BOOTSTRAP_ENCRYPTION_KEY:?N8N bootstrap encryption key must be provided by n8n-secrets}"
              export N8N_ENCRYPTION_KEY="$N8N_BOOTSTRAP_ENCRYPTION_KEY"
            fi

            exec n8n
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        probes:
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 5678
              failureThreshold: 6
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 5678
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
service:
  app:
    controller: n8n
    ports:
      http:
        port: 5678
persistence:
  data:
    enabled: true
    storageClass: nfs-default
    size: 20Gi
    accessMode: ReadWriteOnce
    advancedMounts:
      n8n:
        app:
          - path: /home/node/.n8n
  postgres-client:
    enabled: true
    type: secret
    name: n8n-postgres-client
    advancedMounts:
      n8n:
        app:
          - path: /run/secrets/n8n-postgres
            readOnly: true
        wait-for-postgres:
          - path: /run/secrets/n8n-postgres
            readOnly: true
