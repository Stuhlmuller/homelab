apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: affine-storage
  namespace: affine
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: affine
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: homelab-productivity
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-default
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: affine-config
  namespace: affine
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: affine
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: homelab-productivity
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-default
  resources:
    requests:
      storage: 1Gi
