apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: affine-server
  namespace: affine
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: affine
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 3010
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: affine-data-services
  namespace: affine
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - database
          - cache
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: homelab-productivity
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
