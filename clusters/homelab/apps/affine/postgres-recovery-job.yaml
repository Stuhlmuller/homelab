apiVersion: batch/v1
kind: Job
metadata:
  name: affine-postgres-stale-lock-recovery-20260720
  namespace: affine
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
    checkov.io/skip1: CKV2_K8S_6=The recovery Job has no network dependency and exits after removing one fenced stale lock file.
  labels:
    app.kubernetes.io/name: affine-postgres-recovery
    app.kubernetes.io/component: database-recovery
    app.kubernetes.io/part-of: homelab-productivity
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: affine-postgres-recovery
        app.kubernetes.io/component: database-recovery
        app.kubernetes.io/part-of: homelab-productivity
    spec:
      serviceAccountName: affine
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: remove-fenced-stale-lock
          image: pgvector/pgvector:0.8.1-pg16-bookworm@sha256:16e62164a405447dca191079a924ee5b8a9dbf04fe53128701ffbea857b37782
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              lock_file="/var/lib/postgresql/data/pgdata/postmaster.pid"
              completion_file="/var/lib/postgresql/data/.homelab-postgres-recovery-20260720-complete"

              if [ -e "$completion_file" ]; then
                echo "recovery completion marker is present; leaving PostgreSQL files unchanged"
                exit 0
              fi

              if [ ! -e "$lock_file" ]; then
                echo "no stale PostgreSQL lock file is present"
              else
                echo "removing fenced stale PostgreSQL lock file"
                rm -f -- "$lock_file"
                if [ -e "$lock_file" ]; then
                  echo "stale PostgreSQL lock file still exists after removal" >&2
                  exit 1
                fi
                echo "stale PostgreSQL lock file removed"
              fi

              printf '%s\n' 'completed while affine-postgres was fenced at zero replicas' > "$completion_file"
              echo "recovery completion marker written"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-affine-postgres-0
