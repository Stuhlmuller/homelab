apiVersion: v1
kind: Service
metadata:
  name: affine-postgres
  namespace: affine
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: affine-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: homelab-productivity
spec:
  selector:
    app.kubernetes.io/name: affine-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: affine-postgres
  namespace: affine
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    checkov.io/skip1: CKV_K8S_40=PostgreSQL runs as the QNAP NFS anonymous UID so it owns the root-squashed data directory.
    checkov.io/skip2: CKV_K8S_22=PostgreSQL requires writable image-managed runtime paths; durable data is isolated on its PVC.
    checkov.io/skip3: CKV_K8S_43=The image is pinned to an immutable linux-amd64 digest.
    checkov.io/skip4: CKV2_K8S_6=affine-postgres is covered by networkpolicy.yaml; diff-only scans do not include sibling manifests.
  labels:
    app.kubernetes.io/name: affine-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: homelab-productivity
spec:
  serviceName: affine-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: affine-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: affine-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: homelab-productivity
    spec:
      serviceAccountName: affine
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: require-real-password
          image: pgvector/pgvector:0.8.1-pg16-bookworm@sha256:16e62164a405447dca191079a924ee5b8a9dbf04fe53128701ffbea857b37782
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              password="$(cat /run/secrets/affine/POSTGRES_PASSWORD)"
              if [ -z "$password" ] || [ "$password" = "REPLACE_ME" ]; then
                echo "AFFiNE PostgreSQL password is missing or still uses the placeholder" >&2
                exit 1
              fi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: auth
              mountPath: /run/secrets/affine
              readOnly: true
      containers:
        - name: postgres
          image: pgvector/pgvector:0.8.1-pg16-bookworm@sha256:16e62164a405447dca191079a924ee5b8a9dbf04fe53128701ffbea857b37782
          imagePullPolicy: IfNotPresent
          args:
            # Keep synchronous durability, but reduce checkpoint frequency,
            # spread checkpoint writes, and compress full-page WAL images on
            # the latency-sensitive QNAP NFS volume.
            - -c
            - checkpoint_timeout=15min
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - wal_compression=on
            - -c
            - log_checkpoints=on
            - -c
            - track_io_timing=on
            - -c
            - track_wal_io_timing=on
          env:
            - name: POSTGRES_USER
              value: affine
            - name: POSTGRES_DB
              value: affine
            - name: POSTGRES_PASSWORD_FILE
              value: /run/secrets/affine/POSTGRES_PASSWORD
            - name: POSTGRES_INITDB_ARGS
              value: --data-checksums
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - affine
                - -d
                - affine
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 180
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - affine
                - -d
                - affine
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - affine
                - -d
                - affine
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: auth
              mountPath: /run/secrets/affine
              readOnly: true
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: auth
          secret:
            secretName: affine-secrets
  volumeClaimTemplates:
    - metadata:
        name: data
        annotations:
          argocd.argoproj.io/sync-options: Prune=false
        labels:
          app.kubernetes.io/name: affine-postgres
          app.kubernetes.io/component: database
          app.kubernetes.io/part-of: homelab-productivity
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nfs-default
        resources:
          requests:
            storage: 20Gi
