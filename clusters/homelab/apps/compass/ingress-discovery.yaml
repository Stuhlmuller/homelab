apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: compass-discovery
  labels:
    app.kubernetes.io/name: compass
    app.kubernetes.io/part-of: homelab
spec:
  controller: homelab.stinkyboi.com/compass-discovery
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: compass-discovery-argocd
  namespace: monitoring
  labels:
    compass.adinhodovic.com/enabled: "true"
  annotations:
    compass.adinhodovic.com/name: Argo CD
    compass.adinhodovic.com/urls: "Argo CD=https://argocd.stinkyboi.com"
    compass.adinhodovic.com/description: GitOps control plane and application sync status.
    compass.adinhodovic.com/icon: selfhst:argo-cd
    compass.adinhodovic.com/primary-tag: kubernetes
    compass.adinhodovic.com/tags: platform,gitops
spec:
  ingressClassName: compass-discovery
  rules:
    - host: argocd.stinkyboi.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: compass
                port:
                  number: 8080
---
