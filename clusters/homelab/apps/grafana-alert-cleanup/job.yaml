---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-alerting-cleanup-v3
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-alerting-cleanup-v3
    app.kubernetes.io/part-of: homelab-monitoring
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-alerting-cleanup-v3
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-alerting-cleanup-v3
    app.kubernetes.io/part-of: homelab-monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-alerting-cleanup-v3
      app.kubernetes.io/part-of: homelab-monitoring
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 80
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-alerting-cleanup-v3
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-alerting-cleanup-v3
    app.kubernetes.io/part-of: homelab-monitoring
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-alerting-cleanup-v3
        app.kubernetes.io/part-of: homelab-monitoring
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      serviceAccountName: grafana-alerting-cleanup-v3
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cleanup
          image: python:3.13-alpine@sha256:420cd0bf0f3998275875e02ecd5808168cf0843cbb4d3c536432f729247b2acc
          env:
            - name: GRAFANA_URL
              value: http://grafana.monitoring.svc.cluster.local
          command:
            - python
            - -c
            - |
              import base64
              import json
              import os
              import time
              import urllib.error
              import urllib.request

              base_url = os.environ["GRAFANA_URL"].rstrip("/")
              with open("/var/run/grafana-admin/username", encoding="utf-8") as username_file:
                  username = username_file.read().strip()
              with open("/var/run/grafana-admin/password", encoding="utf-8") as password_file:
                  password = password_file.read().strip()
              auth = base64.b64encode(f"{username}:{password}".encode()).decode()

              def call(method, path, payload=None, ok=(200, 202, 204)):
                  data = None if payload is None else json.dumps(payload).encode()
                  request = urllib.request.Request(
                      f"{base_url}{path}",
                      data=data,
                      headers={
                          "Authorization": f"Basic {auth}",
                          "Content-Type": "application/json",
                          "X-Disable-Provenance": "true",
                      },
                      method=method,
                  )
                  try:
                      with urllib.request.urlopen(request, timeout=20) as response:
                          body = response.read().decode()
                          if response.status not in ok:
                              raise RuntimeError(f"{method} {path} returned {response.status}: {body}")
                          return response.status, body
                  except urllib.error.HTTPError as error:
                      body = error.read().decode()
                      if error.code in ok:
                          return error.code, body
                      raise RuntimeError(f"{method} {path} returned {error.code}: {body}") from error

              def wait_for_grafana():
                  for attempt in range(1, 61):
                      try:
                          status, _ = call("GET", "/api/health", ok=(200,))
                          print(f"grafana health ready: {status}")
                          return
                      except Exception as error:
                          print(f"grafana health not ready ({attempt}/60): {error}")
                          time.sleep(10)
                  raise RuntimeError("grafana did not become healthy within 10 minutes")

              wait_for_grafana()

              status, body = call(
                  "GET",
                  "/api/v1/provisioning/alert-rules/homelab-argocd-app-out-of-sync",
                  ok=(200, 404),
              )
              if status == 200:
                  rule = json.loads(body)
                  changed = False
                  for item in rule.get("data", []):
                      model = item.get("model") or {}
                      if model.get("expr") == 'argocd_app_info{sync_status!="Synced"}':
                          model["expr"] = 'argocd_app_info{sync_status="OutOfSync"}'
                          changed = True
                  if changed:
                      call("PUT", "/api/v1/provisioning/alert-rules/homelab-argocd-app-out-of-sync", rule)
                      print("updated homelab-argocd-app-out-of-sync")
                  else:
                      print("argocd rule already updated")
              else:
                  print("argocd rule already absent")

              status, _ = call(
                  "DELETE",
                  "/api/v1/provisioning/alert-rules/homelab-octobot-deployment-unavailable",
                  ok=(200, 202, 204, 404),
              )
              print(f"delete homelab-octobot-deployment-unavailable: {status}")
          volumeMounts:
            - name: grafana-admin
              mountPath: /var/run/grafana-admin
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
      volumes:
        - name: grafana-admin
          secret:
            secretName: grafana-admin
