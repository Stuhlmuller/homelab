apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: media-postgres
  namespace: media
  annotations:
    checkov.io/skip1: CKV_K8S_40=The data-permissions init container briefly runs as root to hand NFS PVC ownership to PostgreSQL; the database container runs as UID 999.
    checkov.io/skip2: CKV_K8S_22=PostgreSQL requires writable image-managed runtime paths; persistent data is isolated on the data PVC.
    checkov.io/skip3: CKV_K8S_43=Image tags are pinned for GitOps review; digest pinning is tracked separately for homelab images.
    checkov.io/skip4: CKV2_K8S_6=media-postgres is covered by networkpolicy.yaml; diff-only scans do not include sibling manifests.
    checkov.io/skip5: CKV_K8S_37=The data-permissions init container needs CHOWN/FOWNER to repair NFS PVC ownership before PostgreSQL starts.
    checkov.io/skip6: CKV_K8S_25=The data-permissions init container adds only CHOWN/FOWNER for NFS PVC ownership repair before the non-root database container starts.
  labels:
    app.kubernetes.io/name: media-postgres
    app.kubernetes.io/part-of: homelab-media
spec:
  serviceName: media-postgres
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: media-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-postgres
        app.kubernetes.io/part-of: homelab-media
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: data-permissions
          image: postgres:14.23-bookworm
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /var/lib/postgresql/data/pgdata
              chown -R 999:999 /var/lib/postgresql/data/pgdata
              chmod 700 /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
        - name: require-real-password
          image: postgres:14.23-bookworm
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
            - |
              password="$(cat /run/secrets/media-postgres/POSTGRES_PASSWORD)"
              if [ -z "$password" ]; then
                echo "media-postgres password is empty; update /homelab/media-postgres/app-password in SSM" >&2
                exit 1
              fi
              if [ "$password" = "REPLACE_ME" ]; then
                echo "media-postgres password still uses the REPLACE_ME placeholder in SSM" >&2
                exit 1
              fi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: auth
              mountPath: /run/secrets/media-postgres
              readOnly: true
      containers:
        - name: postgres
          image: postgres:14.23-bookworm
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER_FILE
              value: /run/secrets/media-postgres/POSTGRES_USER
            - name: POSTGRES_DB_FILE
              value: /run/secrets/media-postgres/POSTGRES_DB
            - name: POSTGRES_PASSWORD_FILE
              value: /run/secrets/media-postgres/POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - media_apps
                - -d
                - media_apps
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - media_apps
                - -d
                - media_apps
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: auth
              mountPath: /run/secrets/media-postgres
              readOnly: true
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: auth
          secret:
            secretName: media-postgres-auth
        - name: initdb
          configMap:
            name: media-postgres-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: media-postgres
          app.kubernetes.io/part-of: homelab-media
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nfs-default
        resources:
          requests:
            storage: 20Gi
