controllers:
  prowlarr:
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: 2.3.5
        env:
          TZ: America/Los_Angeles
          PUID: "1000"
          PGID: "1000"
service:
  app:
    controller: prowlarr
    ports:
      http:
        port: 9696
persistence:
  config:
    enabled: true
    storageClass: nfs-default
    size: 5Gi
    accessMode: ReadWriteOnce
    globalMounts:
      - path: /config
