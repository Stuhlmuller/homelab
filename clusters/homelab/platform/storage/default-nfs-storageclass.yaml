apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-default
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
    homelab.rst.io/rollout-blocked: "true"
    homelab.rst.io/prerequisite: "existing-nfs-provisioner"
provisioner: nfs.csi.k8s.io
parameters:
  server: nfs-server.example.invalid
  share: /export/homelab
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
mountOptions:
  - hard
  - nfsvers=4.1

