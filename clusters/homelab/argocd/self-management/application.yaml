---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self-management
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-self-management
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/managed-by: argocd
    homelab.stuhlmuller.dev/cluster: homelab
  annotations:
    homelab.stuhlmuller.dev/bootstrap-owner: terragrunt
    homelab.stuhlmuller.dev/catalog-ref: "0.3.0"
    homelab.stuhlmuller.dev/handoff-mode: automated
spec:
  project: homelab
  source:
    repoURL: https://github.com/Stuhlmuller/homelab.git
    path: clusters/homelab/argocd/self-management
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 2m
