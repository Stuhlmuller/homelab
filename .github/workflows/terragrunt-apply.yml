name: Terragrunt Apply

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".checkov.yaml"
      - "IaC/**"
      - "clusters/**"
      - "docs/**"
      - "flake.lock"
      - "flake.nix"
      - "policy/**"
      - "scripts/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: terragrunt-apply-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  KUBE_API_SERVER: 10.1.0.199
  TAILSCALE_VERSION: 1.98.3

jobs:
  static-policy:
    name: Static Policy And Security Checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check Out Repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix Store Cache
        # nix-community/cache-nix-action@v7
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        with:
          primary-key: nix-develop-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-develop-${{ runner.os }}-

      - name: Run Static Checks
        run: nix develop --command bash scripts/ci/static-checks.sh

      - name: Run Conftest Policies
        run: nix develop --command bash scripts/ci/conftest-policies.sh

  terragrunt-apply:
    name: Terragrunt Apply
    needs:
      - static-policy
    runs-on: ubuntu-24.04
    environment:
      name: homelab-production
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 90
    env:
      AWS_APPLY_ROLE_ARN: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB || secrets.AWS_ROLE_TO_ASSUME_HOMELAB }}
      ARM_CLIENT_ID: ${{ vars.AZUREAD_CLIENT_ID || secrets.AZUREAD_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZUREAD_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ vars.AZUREAD_TENANT_ID || secrets.AZUREAD_TENANT_ID }}
      APPLY_BASE_SHA: ${{ github.event.before }}
      APPLY_HEAD_SHA: ${{ github.sha }}
      EXTERNAL_SECRETS_AWS_SSM_ACCESS_KEY_ID: ${{ secrets.EXTERNAL_SECRETS_AWS_SSM_ACCESS_KEY_ID }}
      EXTERNAL_SECRETS_AWS_SSM_SECRET_ACCESS_KEY: ${{ secrets.EXTERNAL_SECRETS_AWS_SSM_SECRET_ACCESS_KEY }}
    steps:
      - name: Check Out Repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix Store Cache
        # nix-community/cache-nix-action@v7
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        with:
          primary-key: nix-develop-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-develop-${{ runner.os }}-

      - name: Verify Production Apply Inputs
        run: |
          test -n "${AWS_APPLY_ROLE_ARN}" || { echo "AWS_ROLE_TO_ASSUME_HOMELAB must be set as a repository or homelab-production environment variable or secret."; exit 1; }
          test -n "${EXTERNAL_SECRETS_AWS_SSM_ACCESS_KEY_ID}" || { echo "EXTERNAL_SECRETS_AWS_SSM_ACCESS_KEY_ID must be set as a homelab-production secret."; exit 1; }
          test -n "${EXTERNAL_SECRETS_AWS_SSM_SECRET_ACCESS_KEY}" || { echo "EXTERNAL_SECRETS_AWS_SSM_SECRET_ACCESS_KEY must be set as a homelab-production secret."; exit 1; }

      - name: Configure AWS Credentials
        # aws-actions/configure-aws-credentials@v6.1.1
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
        with:
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
          role-session-name: homelab-terragrunt-apply-${{ github.run_id }}
          role-to-assume: ${{ env.AWS_APPLY_ROLE_ARN }}
          unset-current-credentials: true

      - name: Connect To Tailnet
        # tailscale/github-action@v4
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}
          tags: tag:github-actions-terragrunt-apply
          version: ${{ env.TAILSCALE_VERSION }}

      - name: Accept Tailnet Subnet Routes
        run: sudo tailscale set --accept-routes=true

      - name: Install Kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: bash scripts/ci/install-kubeconfig.sh

      - name: Verify Kubernetes API Reachability
        run: |
          ip route get "${KUBE_API_SERVER}"
          kubectl --request-timeout=15s version

      - name: Run Terragrunt Apply
        run: nix develop --command bash scripts/ci/terragrunt-apply.sh
