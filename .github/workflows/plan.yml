name: "Homelab Plan"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "nomad/**"
      - "terraform/**"
      - "root.hcl"
      - "mise.toml"
      - "scripts/deploy-live.sh"
      - "scripts/validate-aws-kms.sh"
      - "scripts/validate-aws-ssm.sh"
      - "scripts/ci/**"
      - ".github/actions/setup-infrastructure/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/plan.yml"
      - ".github/workflows/validate.yml"

permissions: {}

concurrency:
  group: terragrunt-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      ARTIFACT_NAME: terragrunt-plan-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
      PLAN_LOG: artifacts/terragrunt-plan.log
      PLAN_SUMMARY: artifacts/terragrunt-plan-summary.md
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      TG_TF_PATH: tofu
      NOMAD_ADDR: http://100.94.104.7:4646
      WORKING_DIR: terraform/live/homelab
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Initialize plan artifacts
        shell: bash
        run: mkdir -p artifacts

      - name: Configure AWS credentials
        if: github.event.pull_request.head.repo.full_name == github.repository && vars.AWS_ROLE_TO_ASSUME_HOMELAB != '' && ((env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '') || vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER != '')
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB }}

      - name: Setup infrastructure access
        if: github.event.pull_request.head.repo.full_name == github.repository && vars.AWS_ROLE_TO_ASSUME_HOMELAB != '' && ((env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '') || vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER != '')
        uses: ./.github/actions/setup-infrastructure
        with:
          aws-region: us-east-1
          tailscale-auth-key-parameter: ${{ vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER }}
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}

      - name: Run Terragrunt plan
        if: github.event.pull_request.head.repo.full_name == github.repository && vars.AWS_ROLE_TO_ASSUME_HOMELAB != '' && ((env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '') || vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER != '')
        id: terragrunt_plan
        shell: bash
        run: |
          set -euo pipefail
          set +e
          terragrunt run --all --tf-path "${TG_TF_PATH}" plan --working-dir "${WORKING_DIR}" -- -refresh=false 2>&1 | tee "${PLAN_LOG}"
          exit_code="${PIPESTATUS[0]}"
          set -e
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"

      - name: Render plan summary
        if: always() && github.event.pull_request.head.repo.full_name == github.repository && vars.AWS_ROLE_TO_ASSUME_HOMELAB != '' && ((env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '') || vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER != '')
        shell: bash
        env:
          PLAN_EXIT_CODE: ${{ steps.terragrunt_plan.outputs.exit_code || '1' }}
        run: |
          python3 scripts/ci/terragrunt_plan_report.py render \
            --log-file "${PLAN_LOG}" \
            --exit-code "${PLAN_EXIT_CODE}" \
            --working-dir "${WORKING_DIR}" \
            --run-url "${RUN_URL}" \
            --artifact-name "${ARTIFACT_NAME}" \
            --commit-sha "${GITHUB_SHA}" \
            --output-file "${PLAN_SUMMARY}"

      - name: Render skipped plan summary when repo configuration is missing
        if: always() && github.event.pull_request.head.repo.full_name == github.repository && (vars.AWS_ROLE_TO_ASSUME_HOMELAB == '' || ((env.TS_OAUTH_CLIENT_ID == '' || env.TS_OAUTH_SECRET == '') && vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER == ''))
        shell: bash
        run: |
          python3 scripts/ci/terragrunt_plan_report.py render-static \
            --status skipped \
            --working-dir "${WORKING_DIR}" \
            --run-url "${RUN_URL}" \
            --artifact-name "${ARTIFACT_NAME}" \
            --commit-sha "${GITHUB_SHA}" \
            --summary-line "Terragrunt plan skipped because the repository is missing required GitHub Actions configuration." \
            --summary-line "Configure the \`AWS_ROLE_TO_ASSUME_HOMELAB\` variable plus either the \`TS_OAUTH_CLIENT_ID\` and \`TS_OAUTH_SECRET\` secrets or the \`TAILSCALE_AUTH_KEY_SSM_PARAMETER\` variable to enable trusted-branch plans on pull requests." \
            --output-file "${PLAN_SUMMARY}"

      - name: Upload plan artifact
        if: always() && github.event.pull_request.head.repo.full_name == github.repository && vars.AWS_ROLE_TO_ASSUME_HOMELAB != '' && ((env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '') || vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER != '')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts/
          if-no-files-found: error

      - name: Update PR description
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 scripts/ci/terragrunt_plan_report.py update-pr-body \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${PR_NUMBER}" \
            --summary-file "${PLAN_SUMMARY}"

      - name: Skip live Terragrunt plan on fork pull requests
        if: github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: echo "Skipping the privileged Terragrunt plan for fork pull requests."

      - name: Fail when plan fails
        if: github.event.pull_request.head.repo.full_name == github.repository && vars.AWS_ROLE_TO_ASSUME_HOMELAB != '' && ((env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '') || vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER != '') && steps.terragrunt_plan.outputs.exit_code != '0'
        shell: bash
        run: exit 1
