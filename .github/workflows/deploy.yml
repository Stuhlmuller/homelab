name: "Homelab Deploy"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "nomad/**"
      - "terraform/**"
      - "root.hcl"
      - "mise.toml"
      - "scripts/deploy-live.sh"
      - "scripts/validate-ansible-layout.sh"
      - "scripts/validate-ansible.sh"
      - "scripts/validate-aws-kms.sh"
      - "scripts/validate-aws-ssm.sh"
      - "scripts/validate-live-cluster.sh"
      - "scripts/validate-live-workloads.sh"
      - "scripts/validate-nomad.sh"
      - "scripts/validate-shell.sh"
      - "scripts/validate-skills.sh"
      - "scripts/validate-terraform.sh"
      - "scripts/validate-terragrunt.sh"
      - "scripts/validate.sh"
      - ".github/actions/setup-infrastructure/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/validate.yml"

permissions: {}

concurrency:
  group: homelab-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TG_TF_PATH: tofu
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Validate deploy configuration
        shell: bash
        env:
          AWS_ROLE_TO_ASSUME_HOMELAB: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB }}
          TAILSCALE_AUTH_KEY_SSM_PARAMETER: ${{ vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          missing=()
          has_oauth=0
          has_authkey=0

          [[ -n "$AWS_ROLE_TO_ASSUME_HOMELAB" ]] || missing+=("AWS_ROLE_TO_ASSUME_HOMELAB")

          if [[ -n "$TS_OAUTH_CLIENT_ID" && -n "$TS_OAUTH_SECRET" ]]; then
            has_oauth=1
          fi

          if [[ -n "$TAILSCALE_AUTH_KEY_SSM_PARAMETER" ]]; then
            has_authkey=1
          fi

          if (( ! has_oauth && ! has_authkey )); then
            missing+=("TS_OAUTH_CLIENT_ID + TS_OAUTH_SECRET or TAILSCALE_AUTH_KEY_SSM_PARAMETER")
          fi

          if ((${#missing[@]})); then
            {
              echo "### Homelab Deploy blocked"
              echo
              echo "Missing repository Actions configuration:"
              for var in "${missing[@]}"; do
                echo "- \`$var\`"
              done
              echo
              echo "Add the variable or secrets in Settings -> Secrets and variables -> Actions, then re-run this workflow."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::error::Missing repository Actions configuration: ${missing[*]}"
            exit 1
          fi

      - name: Install Ansible controller dependencies
        shell: bash
        run: python -m pip install --upgrade pip ansible boto3 botocore

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB }}

      - name: Setup infrastructure access
        uses: ./.github/actions/setup-infrastructure
        with:
          aws-region: us-east-1
          connectivity-probe-address: 100.94.104.7
          connectivity-probe-port: "22"
          tailscale-auth-key-parameter: ${{ vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER }}
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}

      - name: Deploy homelab stack
        shell: bash
        env:
          INGRESS_IP: 100.94.104.7
          NOMAD_ADDR: http://100.94.104.7:4646
          NOMAD_HTTP_IP: 100.94.104.7
          USE_TAILSCALE_ENDPOINTS: "1"
        run: ./scripts/deploy-live.sh --skip-bootstrap
