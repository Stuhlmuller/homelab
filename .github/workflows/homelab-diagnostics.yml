name: Homelab Diagnostics

on:
  workflow_dispatch:

permissions: {}

env:
  KUBE_API_SERVER: 127.0.0.1
  KUBE_API_SERVER_URL: https://127.0.0.1:16443
  KUBE_TLS_SERVER_NAME: 10.1.0.199
  OCTELIUM_DOMAIN: stinkyboi.com
  OCTELIUM_KUBE_SERVICE: kubernetes-api.ci
  OCTELIUM_KUBE_LOCAL_PORT: 16443
  OCTELIUM_IMPLEMENTATION: gvisor
  OCTELIUM_NO_DNS: "false"
  OCTELIUM_TUNNEL_MODE: wireguard
  OCTELIUM_USE_SUDO: "false"

jobs:
  grafana:
    runs-on:
      - self-hosted
      - homelab-ci
    environment:
      name: homelab-plan
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Check Out Repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          enable_kvm: false
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix Store Cache
        # nix-community/cache-nix-action@v7
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        with:
          primary-key: nix-develop-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-develop-${{ runner.os }}-

      - name: Verify Diagnostic Inputs
        env:
          OCTELIUM_AUTH_TOKEN: ${{ secrets.OCTELIUM_CI_AUTH_TOKEN }}
        run: |
          test -n "${OCTELIUM_AUTH_TOKEN}" || { echo "OCTELIUM_CI_AUTH_TOKEN must be set as a homelab-plan environment secret."; exit 1; }

      - name: Install Octelium Client
        run: bash scripts/ci/install-octelium-client.sh

      - name: Connect To Octelium
        env:
          OCTELIUM_AUTH_TOKEN: ${{ secrets.OCTELIUM_CI_AUTH_TOKEN }}
        run: bash scripts/ci/connect-octelium.sh

      - name: Install Kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          KUBE_API_SERVER_URL: ${{ env.KUBE_API_SERVER_URL }}
          KUBE_TLS_SERVER_NAME: ${{ env.KUBE_TLS_SERVER_NAME }}
        run: nix develop --command bash scripts/ci/install-kubeconfig.sh

      - name: Verify Kubernetes API Reachability
        run: |
          curl -ksS --max-time 10 -o /dev/null "${KUBE_API_SERVER_URL}/version"
          nix develop --command kubectl --request-timeout=15s version

      - name: Inspect Grafana
        run: |
          nix develop --command bash <<'EOF'
          set -o pipefail
          kubectl -n monitoring get deploy,rs,pod,svc,endpoints,endpointslice,pvc \
            -l app.kubernetes.io/name=grafana -o wide
          kubectl -n monitoring describe deployment grafana
          kubectl -n monitoring describe service grafana
          kubectl -n monitoring get events \
            --field-selector involvedObject.namespace=monitoring \
            --sort-by=.lastTimestamp | tail -80
          for pod in $(kubectl -n monitoring get pod \
            -l app.kubernetes.io/name=grafana \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'); do
            echo "::group::describe ${pod}"
            kubectl -n monitoring describe pod "${pod}"
            echo "::endgroup::"
            echo "::group::logs ${pod}"
            kubectl -n monitoring logs "${pod}" --all-containers --tail=200 || true
            echo "::endgroup::"
            echo "::group::previous logs ${pod}"
            kubectl -n monitoring logs "${pod}" --all-containers --previous --tail=200 || true
            echo "::endgroup::"
          done
          EOF

      - name: Disconnect Octelium
        if: always()
        run: bash scripts/ci/disconnect-octelium.sh
