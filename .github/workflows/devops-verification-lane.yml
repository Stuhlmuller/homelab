name: "DevOps Verification Lane"

on:
  workflow_dispatch:

permissions: {}

jobs:
  verify-devops-lane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: us-east-1
      AWS_ROLE_TO_ASSUME_HOMELAB: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB }}
      TAILSCALE_AUTH_KEY_SSM_PARAMETER: ${{ vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER }}
      TG_KMS_KEY_ID: alias/homelab-opentofu
      TG_TF_PATH: tofu
      WORKING_DIR: terraform/live/homelab
      NOMAD_ADDR: http://100.94.104.7:4646
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false

      - name: Assert repository configuration
        shell: bash
        env:
          AWS_ROLE_TO_ASSUME_HOMELAB: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB }}
          TAILSCALE_AUTH_KEY_SSM_PARAMETER: ${{ vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_ROLE_TO_ASSUME_HOMELAB}" ]]; then
            echo "::error::Missing required Actions variable AWS_ROLE_TO_ASSUME_HOMELAB."
            exit 1
          fi

          if [[ ( -z "${TS_OAUTH_CLIENT_ID}" || -z "${TS_OAUTH_SECRET}" ) && -z "${TAILSCALE_AUTH_KEY_SSM_PARAMETER}" ]]; then
            echo "::error::Configure Tailscale OAuth secrets (TS_OAUTH_CLIENT_ID + TS_OAUTH_SECRET) or TAILSCALE_AUTH_KEY_SSM_PARAMETER."
            exit 1
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB }}

      - name: Setup infrastructure access
        uses: ./.github/actions/setup-infrastructure
        with:
          aws-region: us-east-1
          tailscale-auth-key-parameter: ${{ vars.TAILSCALE_AUTH_KEY_SSM_PARAMETER }}
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          connectivity-probe-address: 10.1.0.200

      - name: Run DevOps verification checks
        shell: bash
        run: nix develop .# --command ./scripts/ci/devops-verification-lane.sh
