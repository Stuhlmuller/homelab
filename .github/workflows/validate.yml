name: "Validate"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Ansible controller dependencies
        shell: bash
        env:
          PIP_VERSION: "24.0"
          ANSIBLE_VERSION: "9.13.0"
          BOTO3_VERSION: "1.34.162"
          BOTOCORE_VERSION: "1.34.162"
        run: |
          python3 -m pip install --upgrade \
            "pip==${PIP_VERSION}" \
            "ansible==${ANSIBLE_VERSION}" \
            "boto3==${BOTO3_VERSION}" \
            "botocore==${BOTOCORE_VERSION}"

      - name: Run validation harness
        shell: bash
        run: make validate

  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Enforce completion gate policy
        shell: bash
        run: python3 scripts/ci/enforce_completion_gate.py

      - name: Install pre-commit
        shell: bash
        run: python3 -m pip install --upgrade pip pre-commit

      - name: Run PR-focused pre-commit checks
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python3 -m pre_commit run check-yaml --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          python3 -m pre_commit run codespell --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          python3 -m pre_commit run checkov_diff --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          python3 -m pre_commit run checkov_secrets --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          python3 -m pre_commit run zizmor --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"

      - name: Enforce PR completion gate
        shell: bash
        run: python3 scripts/ci/enforce_completion_gate.py

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          version="1.7.9"
          arch="$(uname -m)"
          case "${arch}" in
            x86_64) archive_arch="amd64" ;;
            aarch64|arm64) archive_arch="arm64" ;;
            *)
              echo "unsupported architecture: ${arch}" >&2
              exit 1
              ;;
          esac
          archive="actionlint_${version}_linux_${archive_arch}.tar.gz"
          curl --fail --location --silent --show-error \
            --output "${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          tar -xzf "${archive}" actionlint

      - name: Lint GitHub Actions
        shell: bash
        run: ./actionlint
