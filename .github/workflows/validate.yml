---
name: validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Commit Signatures
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/verify-commit-signatures.sh

      - name: Install Nix
        uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee

      - name: Check flake
        run: nix flake check --no-build --all-systems

      - name: Check HCL Formatting
        run: nix develop --command terragrunt hcl fmt --check

      - name: Validate Terragrunt HCL
        run: nix develop --command terragrunt hcl validate

      - name: Render Kustomize sources
        run: |
          for overlay in clusters/homelab/platform/storage clusters/homelab/argocd/self-management clusters/homelab/apps/*; do
            test -f "$overlay/kustomization.yaml" || continue
            echo "rendering $overlay"
            nix develop --command kubectl kustomize "$overlay" >/dev/null
          done

      - name: Check whitespace
        run: git diff --check

      - name: Secret scan
        run: nix develop --command bash scripts/ci/secret-scan.sh
