name: "Validate"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Run validation harness
        shell: bash
        run: nix run .#validate

  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Enforce completion gate policy
        shell: bash
        run: nix develop .# --command python3 scripts/ci/enforce_completion_gate.py

      - name: Run PR-focused pre-commit checks
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          nix develop .# --command python3 -m pre_commit run check-yaml --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          nix develop .# --command python3 -m pre_commit run codespell --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          nix develop .# --command python3 -m pre_commit run checkov_diff --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          nix develop .# --command python3 -m pre_commit run checkov_secrets --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          nix develop .# --command python3 -m pre_commit run zizmor --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"

      - name: Enforce PR completion gate
        shell: bash
        run: nix develop .# --command python3 scripts/ci/enforce_completion_gate.py

      - name: Lint GitHub Actions
        shell: bash
        run: nix develop .# --command actionlint
