name: Terragrunt Plan

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/workflows/**"
      - ".checkov.yaml"
      - "IaC/**"
      - "clusters/**"
      - "docs/**"
      - "flake.lock"
      - "flake.nix"
      - "policy/**"
      - "scripts/**"

permissions: {}

concurrency:
  group: terragrunt-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  KUBE_API_SERVER: kubernetes-api.ci
  KUBE_API_SERVER_URL: https://kubernetes-api.ci:6443
  KUBE_TLS_SERVER_NAME: 10.1.0.199
  OCTELIUM_DOMAIN: stinkyboi.com
  OCTELIUM_KUBE_SERVICE: kubernetes-api.ci
  OCTELIUM_KUBE_SERVICE_ADDRESS: kubernetes-api.ci
  OCTELIUM_KUBE_LOCAL_PORT: 16443
  OCTELIUM_IMPLEMENTATION: gvisor
  OCTELIUM_NO_DNS: "false"
  OCTELIUM_TUNNEL_MODE: wireguard
  OCTELIUM_USE_SUDO: "false"

jobs:
  static-policy:
    name: Static Policy And Security Checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check Out Repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          enable_kvm: false
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix Store Cache
        # nix-community/cache-nix-action@v7
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        with:
          primary-key: nix-develop-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-develop-${{ runner.os }}-

      - name: Run Static Checks
        run: nix develop --command bash scripts/ci/static-checks.sh

  terragrunt-plan:
    name: Terragrunt Plan
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - static-policy
    runs-on: ubuntu-24.04
    environment:
      name: homelab-plan
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    timeout-minutes: 60
    env:
      AWS_PLAN_ROLE_ARN: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB || secrets.AWS_ROLE_TO_ASSUME_HOMELAB }}
      ARM_CLIENT_ID: ${{ vars.AZUREAD_CLIENT_ID || secrets.AZUREAD_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZUREAD_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ vars.AZUREAD_TENANT_ID || secrets.AZUREAD_TENANT_ID }}
    steps:
      - name: Check Out Repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          enable_kvm: false
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix Store Cache
        # nix-community/cache-nix-action@v7
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        with:
          primary-key: nix-develop-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-develop-${{ runner.os }}-

      - name: Detect Live Terragrunt Plan Scope
        id: live-plan-scope
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          requires_live_plan=false
          while IFS= read -r changed_path; do
            case "${changed_path}" in
              .github/workflows/terragrunt-*.yml|IaC/*|flake.nix|flake.lock|policy/*)
                requires_live_plan=true
                ;;
              scripts/ci/connect-octelium.sh|scripts/ci/disconnect-octelium.sh|scripts/ci/install-kubeconfig.sh|scripts/ci/install-octelium-client.sh|scripts/ci/terragrunt-*|scripts/ci/update-pr-plan-description.sh)
                requires_live_plan=true
                ;;
            esac
          done < <(git diff --name-only "origin/${BASE_REF}...HEAD")

          echo "requires-live-plan=${requires_live_plan}" >>"${GITHUB_OUTPUT}"
          if [ "${requires_live_plan}" = "true" ]; then
            echo "Live Terragrunt plan is required for this pull request."
          else
            echo "No live Terragrunt plan inputs changed; skipping Octelium, Kubernetes, and OpenTofu plan steps."
          fi

      - name: Verify Live Plan Inputs
        if: steps.live-plan-scope.outputs.requires-live-plan == 'true'
        env:
          OCTELIUM_AUTH_TOKEN: ${{ secrets.OCTELIUM_CI_AUTH_TOKEN }}
        run: |
          test -n "${AWS_PLAN_ROLE_ARN}" || { echo "AWS_ROLE_TO_ASSUME_HOMELAB must be set as a repository or homelab-plan environment variable or secret."; exit 1; }
          test -n "${OCTELIUM_AUTH_TOKEN}" || { echo "OCTELIUM_CI_AUTH_TOKEN must be set as a homelab-plan environment secret."; exit 1; }

      - name: Configure AWS Credentials
        if: steps.live-plan-scope.outputs.requires-live-plan == 'true'
        # aws-actions/configure-aws-credentials@v6.1.1
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
        with:
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
          role-session-name: homelab-terragrunt-plan-${{ github.run_id }}
          role-to-assume: ${{ env.AWS_PLAN_ROLE_ARN }}
          unset-current-credentials: true

      - name: Install Octelium Client
        if: steps.live-plan-scope.outputs.requires-live-plan == 'true'
        run: bash scripts/ci/install-octelium-client.sh

      - name: Connect To Octelium
        if: steps.live-plan-scope.outputs.requires-live-plan == 'true'
        env:
          OCTELIUM_AUTH_TOKEN: ${{ secrets.OCTELIUM_CI_AUTH_TOKEN }}
        run: bash scripts/ci/connect-octelium.sh

      - name: Install Kubeconfig
        if: steps.live-plan-scope.outputs.requires-live-plan == 'true'
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          KUBE_API_SERVER_URL: ${{ env.KUBE_API_SERVER_URL }}
          KUBE_TLS_SERVER_NAME: ${{ env.KUBE_TLS_SERVER_NAME }}
        run: nix develop --command bash scripts/ci/install-kubeconfig.sh

      - name: Verify Kubernetes API Reachability
        if: steps.live-plan-scope.outputs.requires-live-plan == 'true'
        run: |
          curl -ksS --max-time 10 -o /dev/null "${KUBE_API_SERVER_URL}/version"
          nix develop --command kubectl --request-timeout=15s version

      - name: Run Terragrunt Plan
        if: steps.live-plan-scope.outputs.requires-live-plan == 'true'
        env:
          TERRAGRUNT_PLAN_MARKDOWN: ${{ runner.temp }}/terragrunt-plan.md
        run: nix develop --command bash scripts/ci/terragrunt-plan.sh

      - name: Write Live Plan Skip Note
        if: steps.live-plan-scope.outputs.requires-live-plan != 'true'
        env:
          TERRAGRUNT_PLAN_MARKDOWN: ${{ runner.temp }}/terragrunt-plan.md
        run: |
          {
            printf '## Terragrunt Plan Output\n\n'
            printf '> Live Terragrunt plan skipped because this pull request did not change `IaC/**`, Terragrunt workflow files, flake inputs, OpenTofu/Terragrunt policy inputs, or live-plan helper scripts.\n\n'
            printf 'Rendered Conftest policies still ran for workflows and Kubernetes manifests in this required check.\n'
          } >"${TERRAGRUNT_PLAN_MARKDOWN}"

      - name: Update PR Description With Plan Or Skip Note
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TERRAGRUNT_PLAN_MARKDOWN: ${{ runner.temp }}/terragrunt-plan.md
        run: nix develop --command bash scripts/ci/update-pr-plan-description.sh

      - name: Run Conftest Policies
        if: ${{ !cancelled() }}
        run: nix develop --command bash scripts/ci/conftest-policies.sh

      - name: Disconnect Octelium
        if: ${{ always() && steps.live-plan-scope.outputs.requires-live-plan == 'true' }}
        run: bash scripts/ci/disconnect-octelium.sh

  fork-plan-skipped:
    name: Terragrunt Plan Skipped For Fork
    if: github.event.pull_request.head.repo.full_name != github.repository
    needs:
      - static-policy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check Out Repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix Store Cache
        # nix-community/cache-nix-action@v7
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        with:
          primary-key: nix-develop-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-develop-${{ runner.os }}-

      - name: Explain Skip
        run: echo "Live Terragrunt plan is skipped for forked pull requests because it requires AWS, Octelium, and Kubernetes secrets."

      - name: Run Conftest Policies
        run: nix develop --command bash scripts/ci/conftest-policies.sh
