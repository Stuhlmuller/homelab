name: Terragrunt Plan

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/workflows/**"
      - ".checkov.yaml"
      - "IaC/**"
      - "clusters/**"
      - "docs/**"
      - "flake.lock"
      - "flake.nix"
      - "policy/**"
      - "scripts/**"

permissions: {}

concurrency:
  group: terragrunt-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  KUBE_API_SERVER: 10.1.0.199
  TAILSCALE_EXIT_NODE: homelab-exit-node
  TAILSCALE_VERSION: 1.98.3

jobs:
  static-policy:
    name: Static Policy And Security Checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check Out Repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Static Checks
        run: nix develop --command bash scripts/ci/static-checks.sh

  terragrunt-plan:
    name: Terragrunt Plan
    if: github.event.pull_request.head.repo.full_name == github.repository
    # The plan reads shared OpenTofu state, so only one trusted PR plan should
    # hold the backend lock at a time.
    concurrency:
      group: terragrunt-plan-live-state
      cancel-in-progress: false
    needs:
      - static-policy
    runs-on: ubuntu-24.04
    environment:
      name: homelab-plan
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    timeout-minutes: 60
    env:
      AWS_PLAN_ROLE_ARN: ${{ vars.AWS_ROLE_TO_ASSUME_HOMELAB || secrets.AWS_ROLE_TO_ASSUME_HOMELAB }}
    steps:
      - name: Check Out Repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Live Plan Inputs
        run: |
          test -n "${AWS_PLAN_ROLE_ARN}" || { echo "AWS_ROLE_TO_ASSUME_HOMELAB must be set as a repository or homelab-plan environment variable or secret."; exit 1; }

      - name: Configure AWS Credentials
        # aws-actions/configure-aws-credentials@v6.1.1
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
        with:
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
          role-session-name: homelab-terragrunt-plan-${{ github.run_id }}
          role-to-assume: ${{ env.AWS_PLAN_ROLE_ARN }}
          unset-current-credentials: true

      - name: Connect To Tailnet
        # tailscale/github-action@v4
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}
          tags: tag:github-actions-terragrunt-plan
          version: ${{ env.TAILSCALE_VERSION }}

      - name: Accept Tailnet Subnet Routes
        run: sudo tailscale set --accept-routes=true

      - name: Select Homelab Exit Node
        run: sudo tailscale set --exit-node="${TAILSCALE_EXIT_NODE}"

      - name: Install Kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: bash scripts/ci/install-kubeconfig.sh

      - name: Verify Kubernetes API Reachability
        run: |
          ip route get "${KUBE_API_SERVER}"
          kubectl --request-timeout=15s version

      - name: Run Terragrunt Plan
        env:
          TERRAGRUNT_PLAN_MARKDOWN: ${{ runner.temp }}/terragrunt-plan.md
        run: nix develop --command bash scripts/ci/terragrunt-plan.sh

      - name: Update PR Description With Plan
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TERRAGRUNT_PLAN_MARKDOWN: ${{ runner.temp }}/terragrunt-plan.md
        run: bash scripts/ci/update-pr-plan-description.sh

      - name: Run Conftest Policies
        if: ${{ !cancelled() }}
        run: nix develop --command bash scripts/ci/conftest-policies.sh

  fork-plan-skipped:
    name: Terragrunt Plan Skipped For Fork
    if: github.event.pull_request.head.repo.full_name != github.repository
    needs:
      - static-policy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check Out Repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        # cachix/install-nix-action@v31
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Explain Skip
        run: echo "Live Terragrunt plan is skipped for forked pull requests because it requires AWS, Tailscale, and Kubernetes secrets."

      - name: Run Conftest Policies
        run: nix develop --command bash scripts/ci/conftest-policies.sh
