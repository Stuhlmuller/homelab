name: "Setup Infrastructure"
description: "Common setup for homelab workflows"

inputs:
  aws-region:
    description: "AWS region used to fetch the optional Tailscale auth key from SSM"
    required: false
    default: "us-east-1"
  tailscale-auth-key:
    description: "Optional Tailscale auth key provided directly by the workflow"
    required: false
    default: ""
  tailscale-auth-key-parameter:
    description: "Optional AWS SSM parameter name that stores a Tailscale auth key"
    required: false
    default: ""
  connectivity-probe-address:
    description: "Optional private address to probe after accepting Tailscale subnet routes"
    required: false
    default: ""
  connectivity-probe-port:
    description: "Optional TCP port to probe instead of ICMP ping"
    required: false
    default: ""
  connectivity-timeout-seconds:
    description: "Maximum number of seconds to wait for the connectivity probe"
    required: false
    default: "180"

runs:
  using: "composite"
  steps:
    - name: Select Tailscale auth key source
      id: auth-mode
      shell: bash
      env:
        TAILSCALE_AUTH_KEY: ${{ inputs.tailscale-auth-key }}
        TAILSCALE_AUTH_KEY_PARAMETER: ${{ inputs.tailscale-auth-key-parameter }}
      run: |
        if [[ -n "${TAILSCALE_AUTH_KEY}" ]]; then
          echo "mode=authkey" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        if [[ -n "${TAILSCALE_AUTH_KEY_PARAMETER}" ]]; then
          echo "mode=authkey-parameter" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        echo "::error::Configure either tailscale-auth-key or tailscale-auth-key-parameter."
        exit 1

    - name: Use provided Tailscale auth key
      if: steps.auth-mode.outputs.mode == 'authkey'
      id: tailscale-auth-key-direct
      env:
        TAILSCALE_AUTH_KEY: ${{ inputs.tailscale-auth-key }}
      shell: bash
      run: |
        echo "::add-mask::${TAILSCALE_AUTH_KEY}"
        echo "authkey=${TAILSCALE_AUTH_KEY}" >> "${GITHUB_OUTPUT}"

    - name: Fetch Tailscale auth key from AWS SSM
      if: steps.auth-mode.outputs.mode == 'authkey-parameter'
      id: tailscale-auth-key-ssm
      env:
        AWS_REGION: ${{ inputs.aws-region }}
        TAILSCALE_AUTH_KEY_PARAMETER: ${{ inputs.tailscale-auth-key-parameter }}
      shell: bash
      run: |
        authkey="$(aws ssm get-parameter \
          --name "${TAILSCALE_AUTH_KEY_PARAMETER}" \
          --with-decryption \
          --region "${AWS_REGION}" \
          --query 'Parameter.Value' \
          --output text)"
        echo "::add-mask::${authkey}"
        echo "authkey=${authkey}" >> "${GITHUB_OUTPUT}"

    - name: Tailscale with provided auth key
      if: steps.auth-mode.outputs.mode == 'authkey'
      uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
      with:
        authkey: ${{ steps.tailscale-auth-key-direct.outputs.authkey }}
        tags: tag:ci
        statedir: /tmp/tailscale-state/

    - name: Tailscale with auth key from AWS SSM
      if: steps.auth-mode.outputs.mode == 'authkey-parameter'
      uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
      with:
        authkey: ${{ steps.tailscale-auth-key-ssm.outputs.authkey }}
        tags: tag:ci
        statedir: /tmp/tailscale-state/

    - name: Accept Tailscale subnet routes
      shell: bash
      run: sudo tailscale set --accept-routes=true

    - name: Wait for Tailscale subnet reachability
      if: inputs.connectivity-probe-address != ''
      env:
        CONNECTIVITY_PROBE_ADDRESS: ${{ inputs.connectivity-probe-address }}
        CONNECTIVITY_PROBE_PORT: ${{ inputs.connectivity-probe-port }}
        CONNECTIVITY_TIMEOUT_SECONDS: ${{ inputs.connectivity-timeout-seconds }}
      shell: bash
      run: |
        deadline=$((SECONDS + CONNECTIVITY_TIMEOUT_SECONDS))

        while ((SECONDS < deadline)); do
          if [[ -n "${CONNECTIVITY_PROBE_PORT}" ]]; then
            if python3 -c 'import socket, sys; socket.create_connection((sys.argv[1], int(sys.argv[2])), timeout=1).close()' \
              "${CONNECTIVITY_PROBE_ADDRESS}" "${CONNECTIVITY_PROBE_PORT}"
            then
              echo "verified TCP reachability to ${CONNECTIVITY_PROBE_ADDRESS}:${CONNECTIVITY_PROBE_PORT}"
              exit 0
            fi
          else
            if ping -c 1 -W 1 "${CONNECTIVITY_PROBE_ADDRESS}" >/dev/null 2>&1; then
              echo "verified Tailscale subnet reachability to ${CONNECTIVITY_PROBE_ADDRESS}"
              exit 0
            fi
          fi

          sleep 5
        done

        if [[ -n "${CONNECTIVITY_PROBE_PORT}" ]]; then
          echo "::error::Timed out waiting for TCP reachability to ${CONNECTIVITY_PROBE_ADDRESS}:${CONNECTIVITY_PROBE_PORT}"
        else
          echo "::error::Timed out waiting for Tailscale subnet reachability to ${CONNECTIVITY_PROBE_ADDRESS}"
        fi
        exit 1
