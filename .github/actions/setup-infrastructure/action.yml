name: "Setup Infrastructure"
description: "Common setup for homelab workflows"

inputs:
  aws-region:
    description: "AWS region used to fetch SSM parameters"
    required: true
  tailscale-auth-key-parameter:
    description: "AWS SSM parameter name that stores the Tailscale auth key"
    required: true
  connectivity-probe-address:
    description: "Optional private address to probe after accepting Tailscale subnet routes"
    required: false
    default: ""
  connectivity-timeout-seconds:
    description: "Maximum number of seconds to wait for the connectivity probe"
    required: false
    default: "180"

runs:
  using: "composite"
  steps:
    - name: Fetch Tailscale auth key from AWS SSM
      id: tailscale-auth-key
      env:
        AWS_REGION: ${{ inputs.aws-region }}
        TAILSCALE_AUTH_KEY_PARAMETER: ${{ inputs.tailscale-auth-key-parameter }}
      shell: bash
      run: |
        authkey="$(aws ssm get-parameter \
          --name "${TAILSCALE_AUTH_KEY_PARAMETER}" \
          --with-decryption \
          --region "${AWS_REGION}" \
          --query 'Parameter.Value' \
          --output text)"
        echo "::add-mask::${authkey}"
        echo "authkey=${authkey}" >> "${GITHUB_OUTPUT}"

    - name: Tailscale
      uses: tailscale/github-action@53acf823325fe9ca47f4cdaa951f90b4b0de5bb9 # v4
      with:
        authkey: ${{ steps.tailscale-auth-key.outputs.authkey }}
        tags: tag:ci
        statedir: /tmp/tailscale-state/

    - name: Accept Tailscale subnet routes
      shell: bash
      run: sudo tailscale set --accept-routes=true

    - name: Wait for Tailscale subnet reachability
      if: inputs.connectivity-probe-address != ''
      env:
        CONNECTIVITY_PROBE_ADDRESS: ${{ inputs.connectivity-probe-address }}
        CONNECTIVITY_TIMEOUT_SECONDS: ${{ inputs.connectivity-timeout-seconds }}
      shell: bash
      run: |
        deadline=$((SECONDS + CONNECTIVITY_TIMEOUT_SECONDS))

        while ((SECONDS < deadline)); do
          if ping -c 1 -W 1 "${CONNECTIVITY_PROBE_ADDRESS}" >/dev/null 2>&1; then
            echo "verified Tailscale subnet reachability to ${CONNECTIVITY_PROBE_ADDRESS}"
            exit 0
          fi

          sleep 5
        done

        echo "::error::Timed out waiting for Tailscale subnet reachability to ${CONNECTIVITY_PROBE_ADDRESS}"
        exit 1
