policy:
  approval:
    - pull request commits have verified signatures
    - or:
        - codex review bot approved
        - rstuhlmuller thumbs-up comment approved
        - organization member approved
  disapproval:
    requires:
      organizations:
        - "Stuhlmuller"

approval_rules:
  - name: pull request commits have verified signatures
    description: >-
      Every pull request commit must have a GitHub-verified signature before
      Policy Bot can approve the change.
    requires:
      count: 0
      conditions:
        has_valid_signatures: true
  - name: codex review bot approved
    description: >-
      Count only the exact top-level thumbs-up comment that the Codex review
      bot posts after approving the latest PR changes with no P0 or P1 review
      alerts.
    options:
      invalidate_on_push: true
      methods:
        comments: []
        comment_patterns:
          - '^\s*👍\s*$'
        github_review: false
        github_review_comment_patterns: []
        body_patterns: []
    requires:
      count: 1
      users:
        - "chatgpt-codex-connector[bot]"
  - name: rstuhlmuller thumbs-up comment approved
    description: >-
      Count only an explicit thumbs-up comment from rstuhlmuller; this approval
      path is valid when rstuhlmuller opened or contributed to the PR, including
      PRs opened by rodman, and PR body text does not satisfy this rule.
    options:
      allow_author: true
      allow_contributor: true
      methods:
        comments: []
        comment_patterns:
          - '^\s*👍(\s|$)'
        github_review: false
        github_review_comment_patterns: []
        body_patterns: []
    requires:
      count: 1
      users:
        - "rstuhlmuller"
  - name: organization member approved
    options:
      allow_author: true
      allow_contributor: true
    requires:
      count: 1
      organizations:
        - "Stuhlmuller"
