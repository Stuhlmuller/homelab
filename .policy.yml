policy:
  approval:
    - pull request commits have verified signatures
    - or:
        - rstuhlmuller thumbs-up comment approved
        - organization member approved
  disapproval:
    requires:
      organizations:
        - "Stuhlmuller"

approval_rules:
  - name: pull request commits have verified signatures
    description: >-
      Every pull request commit must have a GitHub-verified signature before
      Policy Bot can approve the change.
    requires:
      count: 0
      conditions:
        has_valid_signatures: true
  - name: rstuhlmuller thumbs-up comment approved
    description: >-
      Count only an explicit thumbs-up comment from rstuhlmuller; this approval
      path is valid for PRs opened by rodman and PR body text does not satisfy
      this rule.
    options:
      methods:
        comments: []
        comment_patterns:
          - '^\s*👍(\s|$)'
        github_review: false
        github_review_comment_patterns: []
        body_patterns: []
    requires:
      count: 1
      users:
        - "rstuhlmuller"
  - name: organization member approved
    requires:
      count: 1
      organizations:
        - "Stuhlmuller"
