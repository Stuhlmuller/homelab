- name: Install Tailscale apt signing key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
  when: tailscale_enabled

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian {{ ansible_distribution_release }} main"
    filename: tailscale
    state: present
  when: tailscale_enabled

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  when: tailscale_enabled
  notify: restart tailscaled

- name: Ensure tailscaled service is enabled
  ansible.builtin.service:
    name: tailscaled
    enabled: true
    state: started
  when: tailscale_enabled

- name: Read Tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false
  when: tailscale_enabled

- name: Parse Tailscale status payload when available
  ansible.builtin.set_fact:
    tailscale_status_payload: "{{ tailscale_status.stdout | from_json }}"
  when:
    - tailscale_enabled
    - tailscale_status.rc == 0
    - tailscale_status.stdout | default('') | length > 0

- name: Resolve Tailscale auth key from AWS SSM Parameter Store
  ansible.builtin.command:
    argv:
      - aws
      - ssm
      - get-parameter
      - --region
      - "{{ aws_region }}"
      - --name
      - "{{ tailscale_auth_ssm_parameter }}"
      - --with-decryption
      - --query
      - Parameter.Value
      - --output
      - text
  become: false
  delegate_to: localhost
  register: tailscale_auth_key_lookup
  changed_when: false
  no_log: true
  when:
    - tailscale_enabled
    - tailscale_auth_ssm_parameter | default('') | length > 0

- name: Store resolved Tailscale auth key
  ansible.builtin.set_fact:
    tailscale_auth_key_value: "{{ tailscale_auth_key_lookup.stdout }}"
  no_log: true
  when:
    - tailscale_enabled
    - tailscale_auth_ssm_parameter | default('') | length > 0

- name: Determine whether Tailscale requires reauthentication
  ansible.builtin.set_fact:
    tailscale_requires_authkey: >-
      {{
        (tailscale_auth_key_value | default('') | length > 0)
        and (
          not (tailscale_status_payload.HaveNodeKey | default(false) | bool)
          or (tailscale_status_payload.BackendState | default('')) in ['NeedsLogin', 'NeedsMachineAuth']
          or (
            (
              (tailscale_status_payload.Health | default([]) | join(' ') | lower)
              | regex_search('locked out|needs login|logged out')
            ) is not none
          )
        )
      }}
  no_log: true
  when: tailscale_enabled

- name: Build Tailscale up arguments
  ansible.builtin.set_fact:
    tailscale_up_argv: >-
      {{
        ['tailscale', 'up', '--reset']
        + (tailscale_requires_authkey | default(false) | bool | ternary(['--authkey=' ~ tailscale_auth_key_value], []))
        + (tailscale_accept_routes | default(false) | bool | ternary(['--accept-routes'], []))
        + (
          (tailscale_advertise_routes | default([]) | length > 0)
          | ternary(
            ['--advertise-routes=' ~ (tailscale_advertise_routes | join(','))],
            []
          )
        )
        + tailscale_args
      }}
  no_log: true
  when:
    - tailscale_enabled
    - (tailscale_status_payload.HaveNodeKey | default(false) | bool) or (tailscale_auth_key_value | default('') | length > 0)

- name: Join the tailnet when an auth key is available
  ansible.builtin.command:
    argv: "{{ tailscale_up_argv }}"
  no_log: true
  when:
    - tailscale_enabled
    - tailscale_up_argv is defined
    - tailscale_status.rc != 0 or '"BackendState":"Running"' not in tailscale_status.stdout
